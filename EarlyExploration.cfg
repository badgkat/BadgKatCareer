// EarlyExploration.cfg
// Campaign-aligned early game tech tree.
//
// Philosophy: Start with ONLY a pod and goo. FirstScience earns 5 science.
// That first unlock is a real choice: wheels (rover path) or wings (plane path).
// Both paths earn enough science to unlock the other, then rocketry.
//
// start (0 sci): Mk1 Pod + Goo — already stock, no patches needed
// basicRocketry (5 sci): Rover parts — wheels, battery, probe core
// engineering101 (5 sci): Plane parts — prop engine, seat, wing, gear
// Everything else: CTT handles it

// ============================================================================
// BASIC ROCKETRY (5 science) — ROVER PATH
// Probe core on wheels. Drive to the monolith.
// ============================================================================

// Stayputnik probe core — rovers are unmanned
@PART[probeCoreSphere_v2]:FINAL
{
	@TechRequired = basicRocketry
}
@PART[restock-pod-sphere-1]:NEEDS[ReStockPlus]:FINAL
{
	@TechRequired = basicRocketry
}

// Small rover wheel — the dinky one, perfect for a day-one rover
@PART[roverWheel2]:FINAL
{
	@TechRequired = basicRocketry
}

// Z-100 Battery — rovers need electricity to drive
@PART[batteryPack]:FINAL
{
	@TechRequired = basicRocketry
}

// ============================================================================
// ENGINEERING 101 (5 science) — PLANE PATH
// Command seat, wing, prop engine, and a dream. Fly to the island.
// ============================================================================

// KAX Vintage Propelator — the Wright Brothers engine
// Has ModuleResourceIntake built in, so satisfies air intake checks
@PART[KAXVintagePropelator]:NEEDS[KAX]:FINAL
{
	@TechRequired = engineering101
}

// Command seat — a lawn chair bolted to things
@PART[seatExternalCmd]:FINAL
{
	@TechRequired = engineering101
}

// One basic wing — you need exactly one wing type to get airborne
@PART[wingConnector5]:FINAL
{
	@TechRequired = engineering101
}

// Elevon 1 (small control surface) — tiny actuated surface for pitch and roll
@PART[smallCtrlSrf]:FINAL
{
	@TechRequired = engineering101
}

// Fixed landing gear — cannot land a plane without wheels
@PART[GearFixed]:FINAL
{
	@TechRequired = engineering101
}

// Mk0 Liquid Fuel Fuselage — tiny LF-only tank for the prop engine
@PART[miniFuselage]:FINAL
{
	@TechRequired = engineering101
}

// ============================================================================
// NOTES
// ============================================================================
// - mk1pod_v2 and GooExperiment are already at start in stock — no move needed
// - Enclosed cockpits, jet engines, bigger propellers stay deeper as upgrades
// - Larger wheels stay deeper in the tree as progression
// - Mid-to-late tree handled entirely by CTT — no changes
