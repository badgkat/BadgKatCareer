// EarlyExploration.cfg
// Three paths from day one: rockets, planes, rovers.
//
// Philosophy: Career should start with a CHOICE, not a railroad.
// Want to be a rocket scientist? Launch a sounding rocket.
// Want to be the Wright brothers? Strap a seat to a wing and roll downhill.
// Want to explore Kerbin? Bolt wheels on a probe core and drive.
//
// Later nodes provide upgrades (enclosed cockpits, jet engines, bigger wheels)
// but the basics of all three paths are available at start.

// ============================================================================
// PATH 1: ROCKETS (already mostly at start, just adding probe option)
// ============================================================================

// Stayputnik probe core → start
// Probes and pods on equal footing from day one.
@PART[probeCoreSphere_v2]:FINAL
{
	@TechRequired = start
}
@PART[restock-pod-sphere-1]:NEEDS[ReStockPlus]:FINAL
{
	@TechRequired = start
}

// ============================================================================
// PATH 2: WRIGHT BROTHERS PLANES
// A command seat, one basic wing, landing gear, and a dream.
// Real jet engines and enclosed cockpits come later (aviation node).
// ============================================================================

// Command seat → start (it's a lawn chair bolted to things)
@PART[seatExternalCmd]:FINAL
{
	@TechRequired = start
}

// One basic wing → start (you need exactly one wing type to get airborne)
@PART[wingConnector5]:FINAL
{
	@TechRequired = start
}

// Fixed landing gear → start (can't land a plane without wheels)
@PART[GearFixed]:FINAL
{
	@TechRequired = start
}

// Elevon 4 (small control surface) → start — tiny actuated surface for Wright brothers planes
@PART[smallCtrlSrf]:FINAL
{
	@TechRequired = start
}

// Y06 "Flute" Piston Engine → start (the dinky prop engine from Firefly)
// A proper Wright brothers engine — propeller blades included.
@PART[wd_prop_engine_s0_1]:NEEDS[WaterDrinker]:FINAL
{
	@TechRequired = start
}

// Mk0 Liquid Fuel Fuselage → start (tiny LF-only tank for the prop engine)
@PART[miniFuselage]:FINAL
{
	@TechRequired = start
}

// Everything else stays deeper as upgrades:
//   Mk1 Cockpit, jet engines, bigger propellers, intakes, swept wings,
//   tailfin, larger control surfaces, free-rotating gear

// ============================================================================
// PATH 3: ROVERS
// A probe core on wheels. Drive around KSC collecting science.
// ============================================================================

// Small rover wheel (S2) → start — the dinky one, perfect for a day-one rover
@PART[roverWheel2]:FINAL
{
	@TechRequired = start
}

// Medium rover wheel (M1) stays at its default tech node as an upgrade

// RoveMate stays deeper in the tree — early rovers use a Stayputnik on a girder

// Z-100 Battery → start (rovers need electricity to drive)
@PART[batteryPack]:FINAL
{
	@TechRequired = start
}

// Larger wheels stay deeper in the tree as progression:
//   M1 at fieldScience, XL3 at advancedMotors
