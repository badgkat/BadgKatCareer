// EarlyExploration.cfg
// Custom ModuleManager patch: Make surface exploration available earlier in career
// Philosophy: You should be able to strap a kerbal to a chair, bolt on some wheels,
// and drive around KSC before you've been to space.

// ============================================================================
// COMMAND SEAT → survivability (tier 2, 15 science)
// It's literally a chair. You don't need "Field Science" to sit outside.
// ============================================================================
@PART[seatExternalCmd]:FINAL
{
	@TechRequired = survivability
}

// ============================================================================
// BASIC ROVER PARTS → basicScience (tier 3, 45 science)
// Let players build rovers and explore Kerbin's surface early on.
// The small wheel and the RoveMate body are the essentials.
// ============================================================================

// RoveMax Model M1 - the basic rover wheel
@PART[roverWheel1]:FINAL
{
	@TechRequired = basicScience
}

// Probodobodyne RoveMate - compact rover body
@PART[roverBody]:FINAL
{
	@TechRequired = basicScience
}

// ReStock variant of RoveMate (if present)
@PART[roverBody_v2]:NEEDS[ReStockPlus]:FINAL
{
	@TechRequired = basicScience
}

// RoveMax Model S2 - larger wheel stays mid-tree as progression
// (spaceExploration is fine for this one)

// ============================================================================
// DEEPSKY SPITFIRE COCKPIT → aviation (tier 3, 45 science)
// A cockpit shouldn't be free at the start node. Move to aviation
// where all the other airplane parts live.
// ============================================================================
@PART[ds00_srfcockpit]:FINAL
{
	@TechRequired = aviation
}
