// DispositionDecay.cfg - 1 entry per character. Slow decay (180 days/step)
// validates the KCK time-trigger compilation path. In normal play, contract
// completions in a character's domain snap them back up.

DISPOSITION_DECAY
{
    character = gene
    towardValue = Neutral
    stepDays = 180

    STEP
    {
        from = Enthusiastic
        to = Supportive
    }

    STEP
    {
        from = Supportive
        to = Neutral
    }

    STEP
    {
        from = Frustrated
        to = Skeptical
    }

    STEP
    {
        from = Skeptical
        to = Neutral
    }
}

