// Triggers.cfg - chapter machine wiring + the directive scene gate.
// Uses KCK's WHEN block flagExpression and the auto-published contract:<name>.<state> flags.

CAMPAIGN_TRIGGER
{
    id = ch0_entry
    once = true

    ON_EVENT
    {
        type = FacilityEntered
        facility = SpaceCenter
    }

    ACTIONS
    {
        ADVANCE_CHAPTER
        {
            target = 0
        }
    }
}

CAMPAIGN_TRIGGER
{
    id = ch1_entry
    once = true

    ON_EVENT
    {
        type = ContractComplete
        contract = BKEX_FirstScience
    }

    ACTIONS
    {
        ADVANCE_CHAPTER
        {
            target = 1
        }

        ENQUEUE_SCENE
        {
            sceneId = staff_first_recovery
        }

        NOTIFY
        {
            target = admin
            severity = Info
            source = ch1_welcome
        }
    }
}

CAMPAIGN_TRIGGER
{
    id = ch2_entry
    once = true

    ON_EVENT
    {
        type = ContractComplete
        contract = BKEX_RoverMonolith
    }

    ON_EVENT
    {
        type = ContractComplete
        contract = BKEX_FlyToIsland
    }

    WHEN
    {
        flagExpression = contract:BKEX_RoverMonolith.complete == true && contract:BKEX_FlyToIsland.complete == true
    }

    ACTIONS
    {
        ENQUEUE_SCENE
        {
            sceneId = ch1_directive_gene_wernher
        }
    }
}

CAMPAIGN_TRIGGER
{
    id = ch2_advance_on_choice
    once = true

    ON_EVENT
    {
        type = FlagChanged
        name = ch1_choice
    }

    ACTIONS
    {
        ADVANCE_CHAPTER
        {
            target = 2
        }
    }
}
