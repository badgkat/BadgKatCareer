// ch1_directive_gene_wernher.cfg - fires on Ch1->Ch2 boundary.
// Opens with Linus's lifted BothLeads dialogue (paraphrased), then forks via CHOICE.
// Player's choice sets ch1_choice flag; ch2_advance_on_choice trigger advances chapter.

DIALOGUE_SCENE
{
    id = ch1_directive_gene_wernher
    title = Something Is Pointing at the Sky

    CHARACTER
    {
        id = A
        name = Linus Kerman
        model = Strategy_ScienceGuy
        color = #FF6ED4C8
    }

    CHARACTER
    {
        id = B
        name = Gene Kerman
        model = Instructor_Gene
        color = #FF8BE08A
    }

    CHARACTER
    {
        id = C
        name = Wernher von Kerman
        model = Instructor_Wernher
        color = #FF82B4E8
    }

    LINE
    {
        speaker = A
        text = The monolith signal - I have been running it through every algorithm I have. It is structured. Not natural noise, not interference. Something encoded it deliberately. And the geometry of the field lines is pointing up. Off-planet.
    }

    LINE
    {
        speaker = B
        text = So whatever left that thing wants us to follow it somewhere we cannot drive to. We are going to need rockets. Bigger ones than we have built so far.
    }

    LINE
    {
        speaker = C
        text = There are also structures we have not visited. The desert pyramids, the ice formations, more of Kerbin to investigate. Two directions, both legitimate.
    }

    LINE
    {
        speaker = B
        text = So which is it - push to space, or keep working the ground first? It is your program.
    }

    CHOICE
    {
        id = ch1_choice
        OPTION
        {
            value = space
            text = Push to space - the signal is calling.
            description = Bend the program toward orbital and beyond. Aviation work continues but takes a back seat for now.
        }
        OPTION
        {
            value = ground
            text = More ground work first - Kerbin still has secrets.
            description = Aviation milestones and surface anomalies before we leave home. Orbital probes wait their turn.
        }
    }
}
