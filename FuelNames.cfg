// FuelNames.cfg
// Rename stock and modded fuel display names to kerbal-ified versions.
// Internal names stay the same — nothing breaks, everything just reads better.

@RESOURCE_DEFINITION[LiquidFuel]:FINAL
{
	@displayName = Kerbosene
}

@RESOURCE_DEFINITION[Oxidizer]:FINAL
{
	@displayName = Koxide
}

@RESOURCE_DEFINITION[MonoPropellant]:FINAL
{
	@displayName = Kybrazine
}

@RESOURCE_DEFINITION[LqdHydrogen]:NEEDS[CryoTanks]:FINAL
{
	@displayName = Kydrogen
}

@RESOURCE_DEFINITION[LqdMethane]:NEEDS[CryoTanks]:FINAL
{
	@displayName = Kethane
}
