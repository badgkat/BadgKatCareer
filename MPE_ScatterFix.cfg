// MPE_ScatterFix.cfg
// Fix missing BUILTIN/Minmus scatter textures on MPE minor planets.
// MPE references scatter textures that no longer exist in current Kopernicus.
// Remove the broken scatter definitions — bodies still work, just no boulders.

@Kopernicus:AFTER[MPE]
{
	@Body[Flake]
	{
		@PQS
		{
			@Mods
			{
				@LandControl
				{
					!Scatters {}
				}
			}
		}
	}
	@Body[Havous]
	{
		@PQS
		{
			@Mods
			{
				@LandControl
				{
					!Scatters {}
				}
			}
		}
	}
	@Body[Kal]
	{
		@PQS
		{
			@Mods
			{
				@LandControl
				{
					!Scatters {}
				}
			}
		}
	}
}
