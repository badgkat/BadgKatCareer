// Contract for the Kerbin monoliths.
//   Author: nightingale

CONTRACT_TYPE
{
    name = AS_Kerbin_Monolith_Additional
    group = AnomalySurveyor

    sortKey = 00.04.@anomalyIndex
    genericTitle = Undiscovered anomaly on Kerbin
    genericDescription = Where we find one anomaly, we're sure to find others!

    title = Investigate @anomalyName on Kerbin
    description = After visiting the Tycho Magnetic Anomaly (now known as TMA-0), it started to send signals out in several directions.  We could tell the signals were going through the planet, and have been able to calculate where on the surface the signals lead to.  These spots have been marked as TMA-1 through TMA-4.  We need to see where the signals lead.
    synopsis = Investigate @anomalyName.
    completedMessage = The monolith seems to be sending out a signal out into space...  we need to triangulate as many monolith signals as possible.

    // Level 2 prestige
    prestige = Trivial

    targetBody = Kerbin

    // Always offered by the Anomaly Surveyor Group
    agent = Anomaly Surveyor Group

    // Can do the contract once per anomaly
    maxCompletions = 1

    // Contract rewards
    rewardFunds = @rewards.ElementAt(@anomalyIndex)
    rewardScience = 40.0
    rewardReputation = 20.0

    DATA
    {
        type = List<string>
        anomalyNames = [ "TMA-1", "TMA-2", "TMA-3", "TMA-4" ]
    }

    DATA
    {
        type = List<double>

        latitudes = [ -0.640167416590071, 20.6708959294282, -28.8083154046288, 35.5705099080007 ]
        longitudes = [ 279.233233547805, 213.503158424511, -13.4401155804507, -74.9770427670473 ]
        rewards = [ 40000, 60000, 80000, 100000 ]
    }

    DATA_EXPAND
    {
        type = int

        anomalyIndex = [0, 1, 2, 3]
    }

    DATA
    {
        type = string
        anomalyName = @anomalyNames.ElementAt(@anomalyIndex)
    }

    DATA
    {
        type = double
        latitude = @latitudes.ElementAt(@anomalyIndex)
        longitude = @longitudes.ElementAt(@anomalyIndex)
    }

    PARAMETER
    {
        name = WP1
        type = All
        title = Visit TMA-1

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 50
        }

        REQUIREMENT
        {
            type = Expression
            
            expression = @/anomalyIndex == 0
        }
    }

    PARAMETER
    {
        name = WP2
        type = All
        title = Visit TMA-2

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 15
        }

        REQUIREMENT
        {
            type = Expression
            
            expression = @/anomalyIndex == 1
        }
    }

    PARAMETER
    {
        name = WP3
        type = All
        title = Visit TMA-3

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 35
        }

        REQUIREMENT
        {
            type = Expression
            
            expression = @/anomalyIndex == 2
        }
    }

    PARAMETER
    {
        name = WP4
        type = All
        title = Visit TMA-4

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 35
        }

        REQUIREMENT
        {
            type = Expression
            
            expression = @/anomalyIndex == 3
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            // The name of the waypoint - displayed on the marker
            name = @/anomalyName
            icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/monolith

            // The location
            latitude = @/latitude
            longitude = @/longitude
            altitude = 0
        }
    }

    BEHAVIOUR
    {
        name = ChatterBox_Complete
        type = ChatterBox
        onState = CONTRACT_SUCCESS
        title = @/anomalyName

        presentation = Dialogue
        scale = 0.45
        pauseGame = true
        triggerOnce = true

        characterAName = Linus
        characterAModel = Strategy_ScienceGuy
        characterAAnimation = idle_wonder
        characterAColor = #FF6ED4C8

        LINE
        {
        	speaker = A
        	text = Another monolith. The same smooth black surface, the same magnetic readings. And the signal — always pointing somewhere else. They are a trail. Someone wants us to follow.
        }
    }

    REQUIREMENT
    {
        type = CompleteContract
        contractType = BKEX_RoverMonolith
        title = Must have investigated the first monolith
    }
}
