// Contract for visiting the island airfield.
//   Author: nightingale

CONTRACT_TYPE
{
    name = AS_Kerbin_IslandAirfield
    group = AnomalySurveyor

    sortKey = 00.00
    genericTitle = Undiscovered anomaly on Kerbin
    genericDescription = Why don't you start launching some rockets, and we'll find something for you to investigate?

    title = Investigate the Island Airfield
    description = There's an old airfield on an island across from the KSC.  Why don't you go check it out between launches?
    synopsis = Visit the island airfield.
    completedMessage = Hope you had fun, time to get back to work!

    // Level 1 prestige
    prestige = Trivial

    targetBody = Kerbin

    // Always offered by the Anomaly Surveyor Group
    agent = Anomaly Surveyor Group

    // Can only do this contract once
    maxCompletions = 1

    // Contract rewards
    rewardFunds = 25000.0
    rewardReputation = 2.0

    PARAMETER
    {
        name = WP0
        type = All
        title = Climb to the top of the control tower

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 5
        }
    }

    PARAMETER
    {
        name = WP1
        type = All
        title = Look for the burnt out pod in the hangar

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 1
            distance = 25
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        PQS_CITY
        {
            // The name of the waypoint - displayed on the marker
            name = Control Tower
            icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/unknown

            // The location
            pqsCity = IslandAirfield
            pqsOffset = -25.5440407030383, -180.724966497429, 59.493380329812
            altitude = 59.493380329812
        }

        PQS_CITY
        {
            // The name of the waypoint - displayed on the marker
            name = Pod in Hangar
            icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/unknown

            // The location
            pqsCity = IslandAirfield
            pqsOffset = -102.891933658238, -107.91985303655, 18.1263730936462
            altitude = 18.1263730936462
        }
    }

    BEHAVIOUR
    {
        name = ChatterBox_Complete
        type = ChatterBox
        onState = CONTRACT_SUCCESS
        title = The Old Airfield

        presentation = Dialogue
        scale = 0.45
        pauseGame = true
        triggerOnce = true

        characterAName = Gene
        characterAModel = Instructor_Gene
        characterAAnimation = true_nodA
        characterAColor = #FF8BE08A

        LINE
        {
        	speaker = A
        	text = An old airfield on the island. Looks like it has been here for years — overgrown, but the runway is still usable. Someone was flying out here long before us.
        }
    }

    REQUIREMENT
    {
        name = FirstLaunch
        type = FirstLaunch
    }
}
