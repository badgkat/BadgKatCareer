// Contract for the Kerbin monoliths.
//   Author: nightingale

CONTRACT_TYPE
{
    name = AS_Kerbin_Monolith
    group = AnomalySurveyor

    sortKey = 00.03
    genericTitle = Undiscovered anomaly on Kerbin
    genericDescription = There's probably nothing else of interest to find on Kerbin, so we should start looking towards the Mun and Minmus.

    title = Investigate TMA near the KSC
    description = Linus has been complaining that his Tycho brand gyroscopes have been behaving oddly for weeks.  When Wernher finally took a look, he found some strange magnetic fields were affecting the gyroscope.  It seems to be coming from somewhere north of the KSC.  We've dubbed it the Tycho Magnetic Anomaly (TMA).  Check it out and see what's there.
    synopsis = Visit the Tycho Magnetic Anomaly.
    completedMessage = We're reading some sort of signals coming from the Monolith...  Wernher is analysing it.

    // Level 2 prestige
    prestige = Significant

    targetBody = Kerbin

    // Always offered by the Anomaly Surveyor Group
    agent = Anomaly Surveyor Group

    // Can only do this contract once
    maxCompletions = 1

    // Contract rewards
    rewardFunds = 30000.0
    rewardScience = 20.0
    rewardReputation = 15.0

    PARAMETER
    {
        name = WP0
        type = All
        title = Visit TMA

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 15
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            // The name of the waypoint - displayed on the marker
            name = TMA
            icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/monolith

            // The location
            latitude = 0.10227297919058
            longitude = -74.5684338987643
            altitude = 0.0
        }
    }

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Strange Readings

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = idle
		characterAColor = #FF8BE08A

		characterBName = Linus
		characterBModel = Strategy_ScienceGuy
		characterBAnimation = idle
		characterBColor = #FF6ED4C8

		LINE
		{
			speaker = B
			text = Gene, I need to report something. My gyroscopes have been drifting for weeks. I thought the bearings were wearing out, but Wernher checked — it is not mechanical. Something is generating a magnetic field north of the KSC.
		}
		LINE
		{
			speaker = A
			text = A magnetic field? How big are we talking?
		}
		LINE
		{
			speaker = B
			text = Big enough to affect instruments from here. I have been calling it the Tycho Magnetic Anomaly. Whatever is causing it... it is not natural. At least, not any natural thing I have seen before.
		}
		LINE
		{
			speaker = A
			text = That is right in our backyard. Take a rover out there and see what you find. And Linus — keep an open mind.
		}
		LINE
		{
			speaker = B
			text = That is what worries me, Gene. I have a very open mind and it is filling up with very strange possibilities.
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = The Monolith

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Linus
		characterAModel = Strategy_ScienceGuy
		characterAAnimation = idle_wonder
		characterAColor = #FF6ED4C8

		characterBName = Gene
		characterBModel = Instructor_Gene
		characterBAnimation = idle_wonder
		characterBColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = Gene... it is a monolith. A perfectly smooth, perfectly black rectangle, just standing there in the grass. The magnetic readings are off the charts.
		}
		LINE
		{
			speaker = B
			text = Right in our backyard and we never saw it. Maybe if we had windows in the administration building.
		}
		LINE
		{
			speaker = A
			text = I am picking up something else. A signal — very faint, very structured. It is pointing... away. Toward space. Like it wants us to follow it.
		}
		LINE
		{
			speaker = B
			text = Someone put this here, Linus. Someone who is not us.
		}
	}

    // No requirements — the monolith is right next to KSC.
    // Drive a rover there on day one.
}
