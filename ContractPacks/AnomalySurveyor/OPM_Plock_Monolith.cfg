// OPM_Plock_Monolith.cfg — Monolith at the edge of everything

CONTRACT_TYPE:NEEDS[OPM]
{
	name = AS_OPM_Plock_Monolith
	group = AnomalySurveyor

	sortKey = 10.03
	genericTitle = Undiscovered anomaly at the edge of the solar system
	genericDescription = Something is out there. At the very edge.

	title = Investigate signal at the edge of the solar system — Plock
	description = The monolith on Thatmo was pointing toward Plock. And now we are detecting the same signal pattern from the surface of the most distant known body in the solar system. This is no coincidence. Whatever placed these monoliths did so in a deliberate chain — Kerbin, Mun, the outer planets, and now the very edge. The signal from Plock is different though. Stronger. And it is not pointing further out. It is pointing... somewhere else entirely.
	synopsis = Land on Plock and EVA investigate the signal.
	completedMessage = The Plock monolith is unlike any before it. It hums with a frequency that makes your bones ache. The signal is not pointing outward — it is pointing at a specific location near Sarnus. Wernher believes it may be indicating a wormhole. The implications are staggering. We are not alone in this solar system. We may not even be alone in this universe.

	prestige = Exceptional
	targetBody = Plock

	agent = Anomaly Surveyor Group

	maxCompletions = 1

	rewardFunds = 120000.0
	rewardScience = 60.0
	rewardReputation = 30.0

	REQUIREMENT
	{
		name = OrbitedPlock
		type = Orbit
		targetBody = Plock
	}

	REQUIREMENT
	{
		name = ThatmoDone
		type = CompleteContract
		contractType = AS_OPM_Thatmo_Monolith
	}

	BEHAVIOUR
	{
		name = WaypointGenerator
		type = WaypointGenerator

		WAYPOINT
		{
			name = Final Signal
			icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/monolith
			latitude = -22.1
			longitude = 88.7
			altitude = 0.0
		}
	}

	PARAMETER
	{
		name = VisitMonolith
		type = All
		title = Investigate the signal on Plock

		PARAMETER
		{
			name = VesselIsType
			type = VesselIsType
			vesselType = EVA
		}

		PARAMETER
		{
			name = VisitWaypoint
			type = VisitWaypoint
			index = 0
			distance = 15
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = Edge of the System

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Linus
		characterAModel = Strategy_ScienceGuy
		characterAAnimation = idle_wonder
		characterAColor = #FF6ED4C8

		LINE
		{
			speaker = A
			text = The last monolith. The edge of our solar system. And the signal... it is not pointing at another planet this time. It is pointing at a specific region of empty space. Except I do not think it is empty. Wernher needs to see these readings immediately.
		}
	}
}
