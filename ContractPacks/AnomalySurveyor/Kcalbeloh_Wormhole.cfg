// Kcalbeloh_Wormhole.cfg — Investigate the wormhole near Sarnus/Jool
// The Plock monolith pointed here. Now we find out why.

CONTRACT_TYPE:NEEDS[KcalbelohSystem]
{
	name = AS_KC_Wormhole
	group = AnomalySurveyor

	sortKey = 11.01
	genericTitle = Spacetime anomaly detected
	genericDescription = Something is warping spacetime in the outer system.

	title = Investigate the Spacetime Anomaly
	description = The Plock monolith signal was pointing at a region of space near the outer gas giants. Long-range gravitational sensors have confirmed what we feared — or hoped. There is a distortion in spacetime. A tear. A door. The physics team calls it an Einstein-Rosen bridge. Everyone else is calling it a wormhole. Send a probe to investigate. Carefully.
	synopsis = Reach the wormhole (WH3141A) and collect science data.
	completedMessage = The data is extraordinary. It is a wormhole — a stable passage through spacetime to somewhere else. The gravitational readings suggest the other end is near a massive object. Much more massive than anything in our solar system. The science team has one word for what could cause readings like this — a black hole. The monoliths were a road map. And the road leads through that hole in the sky.

	prestige = Exceptional
	targetBody = WH3141A

	agent = Anomaly Surveyor Group

	maxCompletions = 1

	rewardFunds = 100000.0
	rewardScience = 80.0
	rewardReputation = 30.0

	REQUIREMENT
	{
		name = JoolMonolithDone
		type = CompleteContract
		contractType = AS_Jool_Monolith
	}

	REQUIREMENT
	{
		name = ReachedWH
		type = Expression
		expression = ReachedBodies().Where(b => b.Name() == "WH3141A").Count() >= 1
		title = Must have reached the wormhole
	}

	PARAMETER
	{
		name = WormholeInvestigation
		type = VesselParameterGroup
		title = Investigate the wormhole

		PARAMETER
		{
			name = ReachWormhole
			type = Orbit
			targetBody = WH3141A
			situation = ORBITING
			minAltitude = 0
			title = Enter orbit near the wormhole
		}

		PARAMETER
		{
			name = CollectData
			type = CollectScience
			targetBody = WH3141A
			recoveryMethod = RecoverOrTransmit
			title = Collect science data from the wormhole
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = A Hole in the Sky

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = idle_wonder
		characterAColor = #FF82B4E8

		characterBName = Linus
		characterBModel = Strategy_ScienceGuy
		characterBAnimation = idle
		characterBColor = #FF6ED4C8

		LINE
		{
			speaker = A
			text = The monolith signals — all of them, from Kerbin to Plock — they were pointing here. To this region of space. And now our instruments confirm what I hardly dared to hypothesize.
		}
		LINE
		{
			speaker = B
			text = Wernher... what am I looking at? The gravitational readings do not make any sense.
		}
		LINE
		{
			speaker = A
			text = An Einstein-Rosen bridge. In simple terms — a tunnel through spacetime. Two points in the universe connected by a shortcut through the fabric of space itself. The math has predicted them for centuries. Nobody expected to find one.
		}
		LINE
		{
			speaker = B
			text = A wormhole. An actual wormhole. Is it... stable?
		}
		LINE
		{
			speaker = A
			text = The readings suggest yes. Stable and traversable. Something — or someone — built this. The same intelligence that left the monoliths. They were not just markers. They were a road map. And the road leads through that hole in the sky.
		}
		LINE
		{
			speaker = B
			text = Wernher, I have to ask — how concerned should I be?
		}
		LINE
		{
			speaker = A
			text = Profoundly. But also exhilarated. Send the probe through. Carefully.
		}
	}
}
