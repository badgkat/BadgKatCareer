// Kcalbeloh_Dipuc.cfg — The Dipuc Anomaly
// A moon near the wormhole exit with strange gravitational readings.

CONTRACT_TYPE:NEEDS[KcalbelohSystem]
{
	name = AS_KC_Dipuc
	group = AnomalySurveyor

	sortKey = 11.04
	genericTitle = Gravitational anomaly detected
	genericDescription = Something about this moon does not add up.

	title = Investigate gravitational anomaly on Dipuc
	description = Dipuc, a small moon orbiting Sera near the wormhole exit, is producing gravitational readings that make no sense. The mass distribution is wrong — there are concentrated gravity spikes that suggest something buried beneath the surface. The physics team suspects an artificial structure. Given everything we have found so far — monoliths, wormholes, a trail of breadcrumbs across two star systems — nobody is laughing at that theory anymore.
	synopsis = Land on Dipuc and EVA investigate the gravitational anomaly.
	completedMessage = Beneath the surface of Dipuc, the gravimeter readings spike to levels that would require a material denser than anything in nature. The EVA team reports a low vibration felt through their boots — the same frequency as the monoliths. Whatever the builders placed here, it is big, it is deep, and it is still active. Dipuc is not just a moon. It is a machine. And we have only scratched the surface.

	prestige = Exceptional
	targetBody = Dipuc

	agent = Anomaly Surveyor Group

	maxCompletions = 1

	rewardFunds = 150000.0
	rewardScience = 100.0
	rewardReputation = 35.0

	REQUIREMENT
	{
		name = BeyondDone
		type = CompleteContract
		contractType = AS_KC_Beyond
	}

	REQUIREMENT
	{
		name = OrbitedDipuc
		type = Orbit
		targetBody = Dipuc
	}

	BEHAVIOUR
	{
		name = WaypointGenerator
		type = WaypointGenerator

		WAYPOINT
		{
			name = Gravitational Anomaly
			icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/monolith
			latitude = 18.4
			longitude = -42.7
			altitude = 0.0
		}
	}

	PARAMETER
	{
		name = VisitAnomaly
		type = All
		title = Investigate the gravitational anomaly on Dipuc

		PARAMETER
		{
			name = VesselIsType
			type = VesselIsType
			vesselType = EVA
		}

		PARAMETER
		{
			name = VisitWaypoint
			type = VisitWaypoint
			index = 0
			distance = 15
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = Gravitational Anomaly

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = idle_wonder
		characterAColor = #FF82B4E8

		LINE
		{
			speaker = A
			text = The gravitational readings on Dipuc are... wrong. Beautifully wrong. Something beneath the surface is bending spacetime in ways our models cannot account for. Another piece of the puzzle. Whoever built the monoliths left something here too.
		}
	}
}
