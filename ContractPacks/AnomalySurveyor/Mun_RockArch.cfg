// Contract for visiting the Mun rock arches.
//   Author: nightingale

CONTRACT_TYPE
{
    name = AS_Mun_RockArch
    group = AnomalySurveyor

    sortKey = 01.01
    genericTitle = Undiscovered anomaly on @targetBody
    genericDescription = What kind of anomalies might we find if we visit the Mun?

    title = Investigate rock arches on the Mun
    description = Our telescopes found some cool looking arches!  Surely they're good for something, let's go see!
    synopsis = Visit the location of three rock arches on EVA.
    completedMessage = Maybe next we should fly a rocket through the arches?

    // Indicates a contract where SCANsat multipliers should be applied
    tag = SCANsat

    // Level 2 prestige
    prestige = Significant

    targetBody = Mun

    // Always offered by the Anomaly Surveyor Group
    agent = Anomaly Surveyor Group

    // Can only do this contract once
    maxCompletions = 1

    // Contract rewards
    rewardFunds = 300000.0
    rewardReputation = 5.0

    PARAMETER
    {
        name = WP0
        type = All
        title = Visit the first arch

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 125
        }
    }

    PARAMETER
    {
        name = WP1
        type = All
        title = Visit the second arch

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 1
            distance = 125
        }
    }

    PARAMETER
    {
        name = WP2
        type = All
        title = Visit the third arch

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 2
            distance = 125
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        PQS_CITY
        {
            // The name of the waypoint - displayed on the marker
            name = Rock Arch #1
            icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/arch

            // The location name
            pqsCity = RockArch00
        }

        WAYPOINT
        {
            // The name of the waypoint - displayed on the marker
            name = Rock Arch #2
            icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/arch

            latitude = -12.4651384728768
            longitude = -140.954333098427
            altitude = 0.0
        }

        PQS_CITY
        {
            // The name of the waypoint - displayed on the marker
            name = Rock Arch #3
            icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/arch

            // The location name
            pqsCity = RockArch02
        }
    }

    BEHAVIOUR
    {
        name = ChatterBox_Complete
        type = ChatterBox
        onState = CONTRACT_SUCCESS
        title = The Arch

        presentation = Dialogue
        scale = 0.45
        pauseGame = true
        triggerOnce = true

        characterAName = Linus
        characterAModel = Strategy_ScienceGuy
        characterAAnimation = idle_wonder
        characterAColor = #FF6ED4C8

        LINE
        {
        	speaker = A
        	text = A natural rock arch, spanning the crater like a bridge to nowhere. The geologists say it should not exist — the Mun does not have the geological processes to form something like this. And yet, here it is.
        }
    }

    REQUIREMENT
    {
        name = Orbit
        type = Orbit
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        type = All

        hideChildren = true
        title = Must have scanned the correct locations on @targetBody with the anomaly scanner

        REQUIREMENT
        {
            name = WP1
            type = SCANsatLocationCoverage

            pqsCity = RockArch00
        }

        REQUIREMENT
        {
            name = WP1
            type = SCANsatLocationCoverage

            latitude = -12.4651384728768
            longitude = -140.954333098427
        }

        REQUIREMENT
        {
            name = WP2
            type = SCANsatLocationCoverage

            pqsCity = RockArch02
        }
    }
}


@CONTRACT_TYPE[AS_Mun_RockArch]:NEEDS[SCANsat]
{
    @description = Our scans found some cool looking arches!  Surely they're good for something, let's go see!
}
