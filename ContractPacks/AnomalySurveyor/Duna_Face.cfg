// Contract for the face on Duna anomaly.
//   Author: nightingale

CONTRACT_TYPE
{
    name = AS_Duna_Face
    group = AnomalySurveyor

    sortKey = 02.00
    genericTitle = Undiscovered anomaly on @targetBody
    genericDescription = There must be some points on interest on Duna.  Let's have a look?

    title = Investigate Cydunia
    description = The blurry photographs we took from Duna's orbit found a hill that looks rather strange.  We think it looks like...  well, maybe you should just check it out yourself?
    synopsis = Check out Cydunia
    completedMessage = Another anomaly checked off the list!

    // Indicates a contract where SCANsat multipliers should be applied
    tag = SCANsat

    // Level 2 prestige
    prestige = Significant

    targetBody = Duna

    // Always offered by the Anomaly Surveyor Group
    agent = Anomaly Surveyor Group

    // Can only do this contract once
    maxCompletions = 1

    // Contract rewards
    rewardFunds = 50000.0
    rewardReputation = 8.0

    DATA
    {
        type = double
        latitude = 17.0595312879941
        longitude = 274.540904325699
        altitude = 20.76864546351
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Visit Cydunia

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 50
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            // The name of the waypoint - displayed on the marker
            name = Cydunia
            icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/unknown

            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        name = ChatterBox_Complete
        type = ChatterBox
        onState = CONTRACT_SUCCESS
        title = The Face of Duna

        presentation = Dialogue
        scale = 0.45
        pauseGame = true
        triggerOnce = true

        characterAName = Linus
        characterAModel = Strategy_ScienceGuy
        characterAAnimation = idle_wonder
        characterAColor = #FF6ED4C8

        characterBName = Wernher
        characterBModel = Instructor_Wernher
        characterBAnimation = idle
        characterBColor = #FF82B4E8

        LINE
        {
        	speaker = A
        	text = It looks like a face. A huge face, carved into the surface of Duna.
        }
        LINE
        {
        	speaker = B
        	text = Erosion patterns, Linus. Pareidolia — the tendency to see faces in random formations.
        }
        LINE
        {
        	speaker = A
        	text = ...you do not sound entirely convinced, Wernher.
        }
    }

    REQUIREMENT
    {
        name = Any
        type = Any

        REQUIREMENT
        {
            name = Orbit
            type = Orbit
        }
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP0
        type = SCANsatLocationCoverage

        latitude = @/latitude
        longitude = @/longitude

        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}
