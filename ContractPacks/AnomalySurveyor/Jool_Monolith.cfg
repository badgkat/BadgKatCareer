// Contract for the Jool monolith anomaly.
//   Author: nightingale

CONTRACT_TYPE
{
    name = AS_Jool_Monolith
    group = AnomalySurveyor

    sortKey = 05.00
    genericTitle = Undiscovered anomaly near Jool
    genericDescription = If we mess around with things that shouldn't be messed with, we may end up somewhere interesting.

    title = Investigate the monolith signal at Jool
    description = We've traced latest monolith signal to Jool.  We don't know exactly where in the Jool system, but we're confident that if you can make it there we'll be able to figure it out.
    synopsis = Find out what's in the Jool system.
    completedMessage = Well, that was certainly interesting...

    // Level 3 prestige
    prestige = Exceptional

    targetBody = Jool

    // Always offered by the Anomaly Surveyor Group
    agent = Anomaly Surveyor Group

    // Can only do this contract once
    maxCompletions = 1

    // Contract rewards
    rewardFunds = 200000.0
    rewardScience = 40.0
    rewardReputation = 8.6

    PARAMETER
    {
        name = Sequence
        type = Sequence
        title = Investigate the situation

        hiddenParameter = Monolith

        PARAMETER
        {
            name = VesselParameterGroup
            type = VesselParameterGroup

            define = Discovery One

            PARAMETER
            {
                name = HasCrew
                type = HasCrew

                minCrew = 1
                trait = Pilot
            }

            PARAMETER
            {
                name = HasCrew
                type = HasCrew

                minCrew = 1
                trait = Scientist
            }

            PARAMETER
            {
                name = ReachState
                type = ReachState

                situation = ORBITING
            }
        }

        PARAMETER
        {
            name = Rendezvous
            type = Rendezvous

            title = Approach within 20km of the unknown object
            distance = 20000

            vessel = Discovery One
            vessel = Monolith
        }

        PARAMETER
        {
            name = Monolith
            type = Monolith
        }
    }

    BEHAVIOUR
    {
        name = ChatterBox_Complete
        type = ChatterBox
        onState = CONTRACT_SUCCESS
        title = Jool Monolith

        presentation = Dialogue
        scale = 0.45
        pauseGame = true
        triggerOnce = true

        characterAName = Linus
        characterAModel = Strategy_ScienceGuy
        characterAAnimation = idle_wonder
        characterAColor = #FF6ED4C8

        characterBName = Gene
        characterBModel = Instructor_Gene
        characterBAnimation = idle_wonder
        characterBColor = #FF8BE08A

        LINE
        {
        	speaker = A
        	text = A monolith, orbiting Jool itself. Not on a moon — in orbit around the gas giant. The signal is the strongest we have ever recorded. It is pointing toward the outer planets.
        }
        LINE
        {
        	speaker = B
        	text = How far out are we going to have to go, Linus?
        }
        LINE
        {
        	speaker = A
        	text = As far as they want us to, Gene. As far as they want us to.
        }
    }

    BEHAVIOUR
    {
        name = SpawnVessel
        type = SpawnVessel

        deferVesselCreation = true

        VESSEL
        {
            name = Monolith

            craftURL = BadgKatCareer/ContractPacks/AnomalySurveyor/Monolith/Monolith.craft
            vesselType = Unknown
            owned = False

			ORBIT
			{
				SMA = 8001000.30496466
				ECC = 7.42530592330278E-06
				INC = 0
				LPE = 90.5321508078686
				LAN = 102.402138847893
				MNA = 1.56146499268263
				EPH = 446551.435125314
				REF = 8
			}
        }
    }

    REQUIREMENT
    {
        type = Any

        title = Must have visited similar anomalies, and triggered something unexpected
        hideChildren = true

        REQUIREMENT
        {
            type = CompleteContract
            contractType = AS_Mun_Monolith.0
        }

        REQUIREMENT
        {
            type = CompleteContract
            contractType = AS_Mun_Monolith.1
        }

        REQUIREMENT
        {
            type = CompleteContract
            contractType = AS_Mun_Monolith.2
        }

        REQUIREMENT
        {
            type = CompleteContract
            contractType = AS_Mun_Monolith.3
        }
    }
}
