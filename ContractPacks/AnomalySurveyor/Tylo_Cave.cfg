// Contract for dead kraken anomaly.
//   Author: nightingale

CONTRACT_TYPE
{
    name = AS_Tylo_Cave
    group = AnomalySurveyor

    sortKey = 04.00
    genericTitle = Undiscovered anomaly on Joolean moons
    genericDescription = There's sure to be lots of interesting anomalies near Jool.  We just need to figure out which moons to take a closer look at.

    title = Investigate geological formation on Tylo
    description = Our last round of orbital photographs from Tylo showed us a rather interesting geological formation.
    synopsis = Investigate the gelogical formation on Tylo.
    completedMessage = That does it for Tylo.

    // Indicates a contract where SCANsat multipliers should be applied
    tag = SCANsat

    // Level 3 prestige
    prestige = Exceptional

    targetBody = Tylo

    // Always offered by the Anomaly Surveyor Group
    agent = Anomaly Surveyor Group

    // Can only do this contract once
    maxCompletions = 1

    // Contract rewards
    rewardFunds = 70000.0
    rewardReputation = 3.4

    DATA
    {
        type = double
        latitude = 40.1759831291633
        longitude = -185.957917460248
        altitude = -1.01178375829477
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Explore the geological formation

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 650
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            // The name of the waypoint - displayed on the marker
            name = Geological Formation
            icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/unknown

            // The location
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        name = ChatterBox_Complete
        type = ChatterBox
        onState = CONTRACT_SUCCESS
        title = The Cave

        presentation = Dialogue
        scale = 0.45
        pauseGame = true
        triggerOnce = true

        characterAName = Linus
        characterAModel = Strategy_ScienceGuy
        characterAAnimation = idle_wonder
        characterAColor = #FF6ED4C8

        LINE
        {
        	speaker = A
        	text = A cave system on Tylo — a body with no atmosphere and supposedly no geological activity. Caves require erosion or volcanism to form. Tylo has neither. And yet here we are, staring into a hole that should not exist.
        }
    }


    REQUIREMENT
    {
        name = Orbit
        type = Orbit

        title = Must have orbited the correct Joolean moon
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP1
        type = SCANsatLocationCoverage

        latitude = @/latitude
        longitude = @/longitude

        title = Must have scanned the correct location on the target moon with the anomaly scanner
    }
}
