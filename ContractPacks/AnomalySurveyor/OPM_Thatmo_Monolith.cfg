// OPM_Thatmo_Monolith.cfg — Monolith on the frozen wastes of Thatmo

CONTRACT_TYPE:NEEDS[OPM]
{
	name = AS_OPM_Thatmo_Monolith
	group = AnomalySurveyor

	sortKey = 10.02
	genericTitle = Undiscovered anomaly in the outer system
	genericDescription = Long-range scans have detected something unusual in the outer system.

	title = Investigate signal anomaly on Thatmo
	description = Deep space tracking has picked up a faint but unmistakable signal from the surface of Thatmo — a frozen moon orbiting Neidon at the edge of the known system. The signal pattern is identical to the monolith signatures found on Kerbin and the Mun. How something could have placed a structure on a world this remote defies explanation. But the signal is there. And it is waiting.
	synopsis = Land on Thatmo and EVA investigate the signal source.
	completedMessage = Another monolith. This one stands alone on an endless plain of nitrogen ice, under a sky dominated by Neidon. The signal is stronger here than any previous monolith. It seems to be pointing... further out. Toward Plock. Toward the edge of everything.

	prestige = Exceptional
	targetBody = Thatmo

	agent = Anomaly Surveyor Group

	maxCompletions = 1

	rewardFunds = 100000.0
	rewardScience = 50.0
	rewardReputation = 25.0

	REQUIREMENT
	{
		name = OrbitedThatmo
		type = Orbit
		targetBody = Thatmo
	}

	BEHAVIOUR
	{
		name = WaypointGenerator
		type = WaypointGenerator

		WAYPOINT
		{
			name = Signal Source
			icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/monolith
			latitude = 12.8
			longitude = 62.3
			altitude = 0.0
		}
	}

	PARAMETER
	{
		name = VisitMonolith
		type = All
		title = Investigate the signal source on Thatmo

		PARAMETER
		{
			name = VesselIsType
			type = VesselIsType
			vesselType = EVA
		}

		PARAMETER
		{
			name = VisitWaypoint
			type = VisitWaypoint
			index = 0
			distance = 15
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = Frozen Signal

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Linus
		characterAModel = Strategy_ScienceGuy
		characterAAnimation = idle_wonder
		characterAColor = #FF6ED4C8

		LINE
		{
			speaker = A
			text = Another monolith, frozen into the surface of Thatmo. The signal is stronger than any we have detected before. It is pointing outward — past Neidon, past Plock, toward the edge of everything. Something wants us to keep going.
		}
	}
}
