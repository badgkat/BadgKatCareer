// Kcalbeloh_BlackHole.cfg — The Monolith at the Event Horizon
// The 2001 moment. Something is waiting at the black hole.

CONTRACT_TYPE:NEEDS[KcalbelohSystem]
{
	name = AS_KC_BlackHole
	group = AnomalySurveyor

	sortKey = 11.03
	genericTitle = Signal from the black hole
	genericDescription = Something is calling from the darkness.

	title = The Signal at Kcalbeloh — Monolith at the Event Horizon
	description = Since arriving in the Kcalbeloh system, our instruments have been detecting a familiar signal — the same monolith frequency, but orders of magnitude stronger than anything before. It is coming from Kcalbeloh itself. The black hole. Something is there, at the boundary between space and whatever lies beyond. Every monolith we have ever found was pointing here. This is the end of the road. Or the beginning of a new one.
	synopsis = Send a probe to orbit Kcalbeloh and collect data near the black hole.
	completedMessage = The final monolith signal is not coming from a surface — there is no surface. It is coming from the accretion disk itself, riding the edge of the event horizon like a message in a bottle thrown into the fastest current in the universe. The data is... we do not have words. The signal contains patterns that look like star charts, but for places we have never seen. Galaxies. The monoliths were not just a road map to one wormhole. They were the first page of a much longer book.

	prestige = Exceptional
	targetBody = Kcalbeloh

	agent = Anomaly Surveyor Group

	maxCompletions = 1

	rewardFunds = 200000.0
	rewardScience = 150.0
	rewardReputation = 50.0

	REQUIREMENT
	{
		name = BeyondDone
		type = CompleteContract
		contractType = AS_KC_Beyond
	}

	PARAMETER
	{
		name = BlackHoleInvestigation
		type = VesselParameterGroup
		title = Investigate the signal at Kcalbeloh

		PARAMETER
		{
			name = ReachBlackHole
			type = Orbit
			targetBody = Kcalbeloh
			situation = ORBITING
			minAltitude = 0
			title = Enter orbit around Kcalbeloh
		}

		PARAMETER
		{
			name = CollectData
			type = CollectScience
			targetBody = Kcalbeloh
			recoveryMethod = RecoverOrTransmit
			title = Collect data near the black hole
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = The End of the Road

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = idle_wonder
		characterAColor = #FF82B4E8

		characterBName = Gene
		characterBModel = Instructor_Gene
		characterBAnimation = idle_wonder
		characterBColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = A black hole. An object so massive that space and time collapse around it. Light goes in and does not come out. The boundary — the event horizon — is not a surface. It is a point of no return.
		}
		LINE
		{
			speaker = B
			text = The monoliths on Kerbin, on the Mun, on Plock... they were all pointing here. To this.
		}
		LINE
		{
			speaker = A
			text = Whoever built them wanted us to see this. To know it was here. A black hole is not just destruction — it is the most extreme laboratory in the universe. Physics behaves differently here. Time itself runs slower near the horizon.
		}
		LINE
		{
			speaker = B
			text = Wernher... what do we do now?
		}
		LINE
		{
			speaker = A
			text = We study it. We learn from it. And we remember that the universe is much, much larger than we imagined. The monoliths were an invitation. We accepted.
		}
	}
}
