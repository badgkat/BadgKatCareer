// Contract for dead kraken anomaly.
//   Author: nightingale

CONTRACT_TYPE
{
    name = AS_Moho_Mohole
    group = AnomalySurveyor

    sortKey = 03.00
    genericTitle = Undiscovered anomaly on @targetBody
    genericDescription = Is it worth going to Moho?  Nine out of ten rocket scientists say no.  However, Wernher says yes, so...

    title = Investigate geological formation on Moho
    description = While in orbit of Moho, we captured a rather deep formation near the north pole that Linus has dubbed, "the Mohole".
    synopsis = Investigate the Mohole
    completedMessage = That's a rather deep hole.  Maybe next time we'll bring the mountaineering gear.

    // Indicates a contract where SCANsat multipliers should be applied
    tag = SCANsat

    // Level 2 prestige
    prestige = Significant

    targetBody = Moho

    // Always offered by the Anomaly Surveyor Group
    agent = Anomaly Surveyor Group

    // Can only do this contract once
    maxCompletions = 1

    // Contract rewards
    rewardFunds = 50000.0
    rewardScience = 6.4
    rewardReputation = 4.2

    DATA
    {
        type = double
        latitude = 90.0
        longitude = 0.0
        altitude = 5000
    }

    PARAMETER
    {
        name = WP0
        type = All
        title = Investigate the Mohole

        PARAMETER
        {
            name = VesselIsType
            type = VesselIsType

            vesselType = EVA
        }

        PARAMETER
        {
            name = VisitWaypoint
            type = VisitWaypoint

            index = 0
            distance = 875
        }
    }

    BEHAVIOUR
    {
        name = WaypointGenerator
        type = WaypointGenerator

        WAYPOINT
        {
            // The name of the waypoint - displayed on the marker
            name = Mohole
            icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/unknown

            // The location
            latitude = @/latitude
            longitude = @/longitude
            altitude = @/altitude
        }
    }

    BEHAVIOUR
    {
        name = ChatterBox_Complete
        type = ChatterBox
        onState = CONTRACT_SUCCESS
        title = The Mohole

        presentation = Dialogue
        scale = 0.45
        pauseGame = true
        triggerOnce = true

        characterAName = Wernher
        characterAModel = Instructor_Wernher
        characterAAnimation = idle_wonder
        characterAColor = #FF82B4E8

        LINE
        {
        	speaker = A
        	text = A hole. A perfectly cylindrical hole, boring straight down into the crust of Moho. Natural geology does not produce perfect cylinders. Something drilled this. The depth readings are... I would rather not say until I have checked them twice.
        }
    }


    REQUIREMENT
    {
        type = FlyBy
    }

    REQUIREMENT:NEEDS[SCANsat]
    {
        name = WP1
        type = SCANsatLocationCoverage

        latitude = @/latitude
        longitude = @/longitude

        title = Must have scanned the correct location on @targetBody with the anomaly scanner
    }
}
