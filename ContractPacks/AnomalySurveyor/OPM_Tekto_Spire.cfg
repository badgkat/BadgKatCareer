// OPM_Tekto_Spire.cfg — The Orange Spire of Tekto
// OPM's built-in geomagnetic anomaly biome. An orange spire rising from a methane lake.

CONTRACT_TYPE:NEEDS[OPM]
{
	name = AS_OPM_Tekto_Spire
	group = AnomalySurveyor

	sortKey = 10.01
	genericTitle = Undiscovered anomaly in the outer system
	genericDescription = Long-range scans have detected something unusual in the outer system.

	title = Investigate the Geomagnetic Anomaly on Tekto
	description = Long-range magnetic field surveys of Tekto have revealed an impossible reading — a concentrated geomagnetic spike in the middle of a methane lake. Orbital imagery shows what appears to be an orange crystalline spire protruding from the surface. Nothing in our geological models can explain it. Wernher wants a closer look. Much closer.
	synopsis = Land on Tekto and EVA investigate the Geomagnetic Anomaly.
	completedMessage = The spire is real. Up close it is even more unsettling — the orange crystal seems to resonate at a frequency just below hearing. The instruments went haywire within 10 meters. Whatever this is, it is not geological. The Science Division is requesting a permanent research station. Wernher has gone very quiet.

	prestige = Exceptional
	targetBody = Tekto

	agent = Anomaly Surveyor Group

	maxCompletions = 1

	rewardFunds = 80000.0
	rewardScience = 40.0
	rewardReputation = 20.0

	REQUIREMENT
	{
		name = OrbitedTekto
		type = Orbit
		targetBody = Tekto
	}

	BEHAVIOUR
	{
		name = WaypointGenerator
		type = WaypointGenerator

		WAYPOINT
		{
			name = Geomagnetic Anomaly
			icon = BadgKatCareer/ContractPacks/AnomalySurveyor/Icons/monolith
			latitude = 4.5
			longitude = -16.5
			altitude = 0.0
		}
	}

	PARAMETER
	{
		name = VisitSpire
		type = All
		title = Investigate the Geomagnetic Anomaly

		PARAMETER
		{
			name = VesselIsType
			type = VesselIsType
			vesselType = EVA
		}

		PARAMETER
		{
			name = VisitWaypoint
			type = VisitWaypoint
			index = 0
			distance = 15
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = The Spire

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Linus
		characterAModel = Strategy_ScienceGuy
		characterAAnimation = idle_wonder
		characterAColor = #FF6ED4C8

		LINE
		{
			speaker = A
			text = An orange crystalline spire, rising out of Tekto's haze. The geomagnetic readings are extraordinary — this structure is interacting with Tekto's magnetic field in ways I cannot explain. It should not exist. But here it is.
		}
	}
}
