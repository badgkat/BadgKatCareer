// Kcalbeloh_Beyond.cfg — Through the wormhole
// You went through. Now look around.

CONTRACT_TYPE:NEEDS[KcalbelohSystem]
{
	name = AS_KC_Beyond
	group = AnomalySurveyor

	sortKey = 11.02
	genericTitle = Beyond the wormhole
	genericDescription = What lies on the other side?

	title = Through the Wormhole — Investigate WH3141B
	description = We did it. A probe went through the wormhole and emerged... somewhere else. The stars are wrong. The constellations are unrecognizable. Telemetry shows the exit point — designated WH3141B — orbiting a star we have never seen. And beyond that star, gravitational readings confirm it — a supermassive black hole. We are in another star system. Collect data from this side of the bridge.
	synopsis = Reach WH3141B on the far side and collect science data.
	completedMessage = The data from beyond the wormhole is rewriting every physics textbook at KSC. This is a binary system — a star orbiting a black hole. And the wormhole connects our home to this place. Someone — or something — built a bridge between the stars. The monoliths, the signals, the wormhole — it was all an invitation.

	prestige = Exceptional
	targetBody = WH3141B

	agent = Anomaly Surveyor Group

	maxCompletions = 1

	rewardFunds = 120000.0
	rewardScience = 100.0
	rewardReputation = 35.0

	REQUIREMENT
	{
		name = WormholeDone
		type = CompleteContract
		contractType = AS_KC_Wormhole
	}

	REQUIREMENT
	{
		name = ReachedWHB
		type = Expression
		expression = ReachedBodies().Where(b => b.Name() == "WH3141B").Count() >= 1
		title = Must have reached the far side of the wormhole
	}

	PARAMETER
	{
		name = BeyondInvestigation
		type = VesselParameterGroup
		title = Investigate the far side

		PARAMETER
		{
			name = ReachWormholeB
			type = Orbit
			targetBody = WH3141B
			situation = ORBITING
			minAltitude = 0
			title = Orbit near WH3141B
		}

		PARAMETER
		{
			name = CollectData
			type = CollectScience
			targetBody = WH3141B
			recoveryMethod = RecoverOrTransmit
			title = Collect science from beyond the wormhole
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Through the Door

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = idle
		characterAColor = #FF82B4E8

		LINE
		{
			speaker = A
			text = Our probe confirmed the wormhole is traversable. On the other side — a new star system, orbiting something we cannot see directly. The instruments say it is there. A presence defined by what it does to everything around it. We go through.
		}
	}
}
