// KS_Batch4.cfg — Kerbin Side bases, hypersonic range (~8000km+)
// Requires: Hypersonic complete, Kerbin Side Remastered installed
// These are the most remote bases on Kerbin. Getting here is an achievement.

// ============================================================================
// POLAR RESEARCH ALPHA (~8100km from KSC)
// ============================================================================
CONTRACT_TYPE:NEEDS[KerbinSideRemastered]
{
	name = BKML_KS_PolarAlpha
	group = BadgKatMilestones

	title = Fly to Polar Research Alpha
	genericTitle = Visit a Kerbin Side base
	description = Polar Research Alpha is a scientific outpost near the north pole. The 1700m runway is carved out of frozen tundra and the approach is challenging — crosswinds, low visibility, and terrain that does not forgive mistakes. The research team there has been requesting supply flights for months.
	synopsis = Fly to Polar Research Alpha and land.
	completedMessage = Polar Research Alpha reached! The arctic wind nearly took the wings off on approach, but we made it. The research team is overjoyed — apparently they ran out of snacks two weeks ago.

	prestige = Exceptional
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 45000.0
	rewardReputation = 10.0
	rewardScience = 3.0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = HypersonicDone
		type = CompleteContract
		contractType = BKML_Hypersonic
	}

	BEHAVIOUR
	{
		name = WaypointGenerator
		type = WaypointGenerator

		WAYPOINT
		{
			name = Polar Research Alpha
			icon = marker
			latitude = 72.5668
			longitude = -78.4435
			altitude = 0
		}
	}

	PARAMETER
	{
		name = FlyToBase
		type = VesselParameterGroup
		title = Fly to Polar Research Alpha and land

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = ReachBase
			type = VisitWaypoint
			index = 0
			distance = 500
			title = Reach Polar Research Alpha (within 500m)
		}

		PARAMETER
		{
			name = LandSafely
			type = ReachState
			situation = LANDED
			title = Land safely
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Polar Research Alpha

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = idle
		characterAColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = Polar Research Alpha. It is cold, it is dark half the year, and the runway is made of packed ice. The crew there is... eager for visitors.
		}
	}
}

