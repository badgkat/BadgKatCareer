// OrbitalSpaceplane.cfg — Orbit and return with wings

CONTRACT_TYPE
{
	name = BKML_OrbitalSpaceplane
	group = BadgKatMilestones

	title = Orbital Spaceplane
	genericTitle = Orbital Spaceplane
	description = Suborbital was the warm-up. Now the real challenge — build a winged vessel that can reach stable orbit around Kerbin and return to land on a runway. This is the dream of reusable spaceflight. No boosters left behind, no stages dropped in the ocean. Everything that goes up comes back down in one piece.
	synopsis = Orbit Kerbin in a winged vessel and land safely.
	completedMessage = SSTO achieved! A winged vessel has reached orbit and returned to the runway — nothing dropped, nothing wasted. Reusable spaceflight is here.

	prestige = Exceptional
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 60000.0
	rewardReputation = 12.0
	rewardScience = 5.0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = SuborbitalDone
		type = CompleteContract
		contractType = BKML_SuborbitalSpaceplane
	}

	PARAMETER
	{
		name = OrbitalSpaceplaneParam
		type = VesselParameterGroup
		title = Orbital spaceplane flight

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = Orbit
			type = Orbit
			targetBody = HomeWorld()
			situation = ORBITING
			minAltitude = 0
			title = Reach stable orbit
		}
	}

	PARAMETER
	{
		name = ReturnHome
		type = ReturnHome
		title = Return home and land safely
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = Orbital SSTO

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Gus
		characterAModel = Strategy_MechanicGuy
		characterAAnimation = true_smileA
		characterAColor = #FFFFC078

		LINE
		{
			speaker = A
			text = She made it to orbit and came back in one piece. I was not sure about the thermal tiles on the belly, but she held together. Runway to orbit and back — that is engineering.
		}
	}
}
