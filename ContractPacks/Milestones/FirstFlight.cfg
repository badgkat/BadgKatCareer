// FirstFlight.cfg — Day one aviation milestone
// "Fly a winged vessel." The Wright Brothers moment.

CONTRACT_TYPE
{
	name = BKML_FirstFlight
	group = BadgKatMilestones

	title = First Flight
	genericTitle = First Flight
	description = The engineering team has been sketching designs on napkins in the cafeteria. Wings, a fuselage, maybe an engine or two. It is time to see if their creation can actually leave the ground. Fly a winged vessel in the atmosphere.
	synopsis = Fly a winged vessel in the atmosphere.
	completedMessage = Flight confirmed! The ground crew is cheering, the engineers are already arguing about the next design, and someone just ordered a second runway. Aviation has arrived at KSC.

	prestige = Trivial
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 8000.0
	rewardReputation = 3.0
	rewardScience = 1.0
	failureFunds = 0
	advanceFunds = 0

	PARAMETER
	{
		name = FirstFlightParam
		type = VesselParameterGroup
		title = Fly a winged vessel

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = IsFlying
			type = ReachState
			situation = FLYING
			title = Be airborne
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = The Dream of Flight

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = idle
		characterAColor = #FF82B4E8

		characterBName = Gene
		characterBModel = Instructor_Gene
		characterBAnimation = idle
		characterBColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = In 1903, two bicycle mechanics built a machine out of wood and fabric that flew for twelve seconds. Twelve seconds! That was enough to change everything.
		}
		LINE
		{
			speaker = B
			text = We have slightly better materials. And a runway that is longer than a sand dune.
		}
		LINE
		{
			speaker = A
			text = The physics is simple and beautiful — air moves faster over a curved wing, creating lower pressure on top. That difference in pressure is lift. Fight gravity with geometry.
		}
		LINE
		{
			speaker = A
			text = One critical detail — the center of lift should sit just behind the center of mass. That way, if the nose dips, the lift pushes it back up. If it is the other way around... well. You will find out quickly.
		}
		LINE
		{
			speaker = B
			text = I have the fire crew standing by. Not that I am worried. Perfectly routine first flight.
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = Aviation Arrives

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = true_smileA
		characterAColor = #FF8BE08A

		characterBName = Wernher
		characterBModel = Instructor_Wernher
		characterBAnimation = true_nodA
		characterBColor = #FF82B4E8

		LINE
		{
			speaker = A
			text = Flight confirmed. The ground crew is cheering, the engineers are already arguing about the next design, and someone just ordered a second runway.
		}
		LINE
		{
			speaker = B
			text = Wings beat gravity today. Next we see how fast they can go. Those bicycle mechanics would be proud.
		}
	}

	// DEPRECATED: Replaced by campaign version
	REQUIREMENT
	{
		name = Deprecated
		type = Expression
		expression = false
		title = This contract has been replaced by the campaign version
	}
}
