// KS_Batch3.cfg — Kerbin Side bases, advanced jet range (~3700-7200km)
// Requires: Mach3 complete, Kerbin Side Remastered installed

// ============================================================================
// KERMAN ATOLL (~3700km from KSC)
// ============================================================================
CONTRACT_TYPE:NEEDS[KerbinSideRemastered]
{
	name = BKML_KS_KermanAtoll
	group = BadgKatMilestones

	title = Fly to Kerman Atoll
	genericTitle = Visit a Kerbin Side base
	description = Kerman Atoll is a remote island base deep in the southern ocean. The atoll has both a runway and a launch pad — someone had ambitious plans for this place. Getting here requires serious range and navigation skills. The isolation is the point.
	synopsis = Fly to Kerman Atoll and land.
	completedMessage = Landed at Kerman Atoll! This place is remote, windswept, and somehow has a perfectly maintained launch pad. Whoever built this was thinking ahead.

	prestige = Significant
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 35000.0
	rewardReputation = 7.0
	rewardScience = 0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = Mach3Done
		type = CompleteContract
		contractType = BKML_Mach3
	}

	BEHAVIOUR
	{
		name = WaypointGenerator
		type = WaypointGenerator

		WAYPOINT
		{
			name = Kerman Atoll
			icon = marker
			latitude = -37.1457
			longitude = -71.0359
			altitude = 0
		}
	}

	PARAMETER
	{
		name = FlyToBase
		type = VesselParameterGroup
		title = Fly to Kerman Atoll and land

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = ReachBase
			type = VisitWaypoint
			index = 0
			distance = 500
			title = Reach Kerman Atoll (within 500m)
		}

		PARAMETER
		{
			name = LandSafely
			type = ReachState
			situation = LANDED
			title = Land safely
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Kerman Atoll

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = idle
		characterAColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = Kerman Atoll — a speck in the ocean with a landing strip that was clearly designed by someone who has never landed an airplane.
		}
	}
}

