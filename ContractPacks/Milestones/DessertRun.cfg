// DessertRun.cfg — Fly to the Dessert Airfield (~900km)
// Requires Making History DLC (SquadExpansion)

CONTRACT_TYPE:NEEDS[SquadExpansion]
{
	name = BKML_DessertRun
	group = BadgKatMilestones

	title = Dessert Run — Fly to the Dessert Airfield
	genericTitle = Fly to the Dessert Airfield
	description = The Dessert Airfield is a remote strip out in the badlands, roughly 900 kilometers from KSC. This is a real endurance flight — fuel management, navigation, and a landing on a strip surrounded by nothing but sand and regret. The ground crew out there says they have snacks. They might be lying.
	synopsis = Fly a winged vessel to the Dessert Airfield and land.
	completedMessage = Wheels down at the Dessert Airfield! The crew chief here says we are the first visitors in months. The snacks were real — slightly stale, but real.

	prestige = Significant
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 30000.0
	rewardReputation = 6.0
	rewardScience = 0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = IslandHopDone
		type = CompleteContract
		contractType = BKEX_FlyToIsland
	}

	BEHAVIOUR
	{
		name = WaypointGenerator
		type = WaypointGenerator

		WAYPOINT
		{
			name = Dessert Airfield
			icon = marker
			latitude = -6.56
			longitude = -144.04
			altitude = 0
		}
	}

	PARAMETER
	{
		name = DessertRunParam
		type = VesselParameterGroup
		title = Fly to the Dessert Airfield and land

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = ReachDessert
			type = VisitWaypoint
			index = 0
			distance = 500
			title = Reach the Dessert Airfield (within 500m)
		}

		PARAMETER
		{
			name = LandSafely
			type = ReachState
			situation = LANDED
			title = Land safely
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Dessert Airfield

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = idle
		characterAColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = There is an old airstrip out in the desert. Dusty, flat, and a long way from help. Good place to test if our cross-country navigation is as good as we think.
		}
	}
}
