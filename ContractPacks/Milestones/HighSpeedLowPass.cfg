// HighSpeedLowPass.cfg — Buzz the tower (Mach 2 below 1000m)

CONTRACT_TYPE
{
	name = BKML_HighSpeedLowPass
	group = BadgKatMilestones

	title = High-Speed Low Pass
	genericTitle = High-Speed Low Pass
	description = The flight test division has a dare for any pilot brave enough to try it. Fly a winged vessel at Mach 2 or faster below 1000 meters altitude. The control tower staff have been warned. Jeb has already volunteered three times. Gene said no twice but is running out of excuses.
	synopsis = Exceed Mach 2 (686 m/s) below 1000m altitude in a winged vessel.
	completedMessage = The tower shook, coffee cups went flying, and Gene is pretending to be angry. The flight recorder data shows a clean pass — fast, low, and under control. Mostly.

	prestige = Significant
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 25000.0
	rewardReputation = 5.0
	rewardScience = 0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = SoundBarrierDone
		type = CompleteContract
		contractType = BKML_SoundBarrier
	}

	PARAMETER
	{
		name = HighSpeedLowPassParam
		type = VesselParameterGroup
		title = High-speed low pass

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = BuzzTheTower
			type = ReachState
			situation = FLYING
			minSpeed = 686
			maxAltitude = 1000
			title = Exceed 686 m/s (Mach 2) below 1000m
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Buzzing the Tower

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = idle
		characterAColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = The ground crew wants a flyby. Fast and low — below a thousand meters. I am told this is for "calibration purposes." I suspect it is for bragging rights. Please do not hit anything.
		}
	}
}
