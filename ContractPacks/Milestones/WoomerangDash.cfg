// WoomerangDash.cfg — Fly to Woomerang (~1200km)
// Requires Making History DLC (SquadExpansion)

CONTRACT_TYPE:NEEDS[SquadExpansion]
{
	name = BKML_WoomerangDash
	group = BadgKatMilestones

	title = Woomerang Dash — Fly to Woomerang
	genericTitle = Fly to the Woomerang Launch Site
	description = Woomerang is about as far from KSC as you can get without leaving the continent — over 1200 kilometers north, near the tundra line. This is the ultimate endurance flight. Fuel will be tight, the terrain is unforgiving, and the landing strip was built by optimists. But if we can fly here, we can fly anywhere on Kerbin.
	synopsis = Fly a winged vessel to Woomerang and land.
	completedMessage = Landed at Woomerang! The ground crew is bundled up in parkas and wondering why we did not just launch from here. Our aircraft has crossed the continent — every corner of Kerbin is now within reach by air.

	prestige = Exceptional
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 40000.0
	rewardReputation = 8.0
	rewardScience = 0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = DessertRunDone
		type = CompleteContract
		contractType = BKML_DessertRun
	}

	BEHAVIOUR
	{
		name = WaypointGenerator
		type = WaypointGenerator

		WAYPOINT
		{
			name = Woomerang Launch Site
			icon = marker
			latitude = 45.29
			longitude = 136.11
			altitude = 0
		}
	}

	PARAMETER
	{
		name = WoomerangDashParam
		type = VesselParameterGroup
		title = Fly to Woomerang and land

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = ReachWoomerang
			type = VisitWaypoint
			index = 0
			distance = 500
			title = Reach Woomerang Launch Site (within 500m)
		}

		PARAMETER
		{
			name = LandSafely
			type = ReachState
			situation = LANDED
			title = Land safely
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Woomerang

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Gus
		characterAModel = Strategy_MechanicGuy
		characterAAnimation = idle
		characterAColor = #FFFFC078

		LINE
		{
			speaker = A
			text = Woomerang is up north — way up. Cold, windy, and the runway is more of a suggestion. She will handle it, but keep the approach speed low. I just waxed her.
		}
	}
}
