// EdgeOfSpace.cfg — Fly above 18,000m in atmosphere

CONTRACT_TYPE
{
	name = BKML_EdgeOfSpace
	group = BadgKatMilestones

	title = Edge of Space
	genericTitle = Edge of Space
	description = How high can a winged aircraft go before the atmosphere gives out? The science team wants data from the upper atmosphere — that thin slice of sky where jet engines sputter and wings barely bite. Push an aircraft above 18,000 meters while still maintaining aerodynamic flight. Up there, the sky is black and the horizon curves.
	synopsis = Fly a winged vessel above 18,000m while still in the atmosphere.
	completedMessage = 18,000 meters and still flying! The pilot reports the sky was dark blue fading to black, and the controls felt like they were made of suggestions. The upper atmosphere data is invaluable.

	prestige = Significant
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 30000.0
	rewardReputation = 6.0
	rewardScience = 3.0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = SoundBarrierDone
		type = CompleteContract
		contractType = BKML_SoundBarrier
	}

	PARAMETER
	{
		name = EdgeOfSpaceParam
		type = VesselParameterGroup
		title = Fly to the edge of space

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = HighAlt
			type = ReachState
			situation = FLYING
			minAltitude = 18000
			title = Fly above 18,000m in atmosphere
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = Edge of Space

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = idle_wonder
		characterAColor = #FF82B4E8

		LINE
		{
			speaker = A
			text = Eighteen kilometers up — where the atmosphere thins to almost nothing and the sky darkens to near-black. This is the boundary between aviation and spaceflight. You are flying at the edge of where wings stop working.
		}
	}
}
