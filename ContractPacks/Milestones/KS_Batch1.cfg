// KS_Batch1.cfg — Kerbin Side bases, prop engine range (~200-800km)
// Requires: IslandHop complete, Kerbin Side Remastered installed

// ============================================================================
// KOLA ISLAND (~200km from KSC)
// ============================================================================
CONTRACT_TYPE:NEEDS[KerbinSideRemastered]
{
	name = BKML_KS_KolaIsland
	group = BadgKatMilestones

	title = Fly to Kola Island
	genericTitle = Visit a Kerbin Side base
	description = There is a small airstrip on Kola Island, just south of KSC. A short hop over the water — good practice for cross-country navigation. The strip is basic but serviceable.
	synopsis = Fly to Kola Island and land.
	completedMessage = Landed at Kola Island! Another airstrip added to our network.

	prestige = Significant
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 15000.0
	rewardReputation = 3.0
	rewardScience = 0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = IslandHopDone
		type = CompleteContract
		contractType = BKML_IslandHop
	}

	BEHAVIOUR
	{
		name = WaypointGenerator
		type = WaypointGenerator

		WAYPOINT
		{
			name = Kola Island
			icon = marker
			latitude = -4.0468
			longitude = -72.1614
			altitude = 0
		}
	}

	PARAMETER
	{
		name = FlyToBase
		type = VesselParameterGroup
		title = Fly to Kola Island and land

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = ReachBase
			type = VisitWaypoint
			index = 0
			distance = 500
			title = Reach Kola Island (within 500m)
		}

		PARAMETER
		{
			name = LandSafely
			type = ReachState
			situation = LANDED
			title = Land safely
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Kola Island

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = idle
		characterAColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = Kola Island — short hop south over the water. Good warmup for longer trips.
		}
	}
}

