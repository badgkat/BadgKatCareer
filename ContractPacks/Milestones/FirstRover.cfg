// FirstRover.cfg — Day one rover milestone

CONTRACT_TYPE
{
	name = BKML_FirstRover
	group = BadgKatMilestones

	title = First Rover Drive
	genericTitle = First Rover Drive
	description = The engineering team has bolted some wheels to a probe core and called it a rover. Time to see if it actually works. Drive a wheeled vehicle on the surface. Bonus points if it does not flip over immediately.
	synopsis = Drive a wheeled vehicle on the surface.
	completedMessage = The rover is rolling! It only flipped twice during testing, which the engineers are calling a personal best. Surface exploration by wheel is now a viable option for the space program.

	prestige = Trivial
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 8000.0
	rewardReputation = 3.0
	rewardScience = 1.0
	failureFunds = 0
	advanceFunds = 0

	PARAMETER
	{
		name = FirstRoverParam
		type = VesselParameterGroup
		title = Drive a rover

		PARAMETER
		{
			name = HasWheels
			type = PartValidation
			partModule = ModuleWheelMotor
			minCount = 1
			title = Vessel must have powered wheels
		}

		PARAMETER
		{
			name = NoEngines
			type = PartValidation
			title = No engines — drive on wheels, not thrust

			NONE
			{
				partModule = ModuleEngines
			}

			NONE
			{
				partModule = ModuleEnginesFX
			}
		}

		PARAMETER
		{
			name = IsDriving
			type = ReachState
			situation = LANDED
			minSpeed = 1
			title = Be moving on the surface
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Meet the Rover

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = idle
		characterAColor = #FF8BE08A

		characterBName = Gus
		characterBModel = Strategy_MechanicGuy
		characterBAnimation = idle
		characterBColor = #FFFFC078

		LINE
		{
			speaker = A
			text = Our head engineer has been building something out in the workshop. Gus, you want to show them?
		}
		LINE
		{
			speaker = B
			text = She is not pretty, but she runs. I bolted some wheels to a probe core, wired up the batteries, and gave her a good kick. She pulls a little to the left, but she will get you there.
		}
		LINE
		{
			speaker = A
			text = "There" being anywhere on the surface you can reach without a rocket. Rovers open up a whole planet for exploration.
		}
		LINE
		{
			speaker = B
			text = Just keep her under five meters per second on the hills. She is top-heavy and I am not building another one this week.
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = She Rolls

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Gus
		characterAModel = Strategy_MechanicGuy
		characterAAnimation = true_smileA
		characterAColor = #FFFFC078

		LINE
		{
			speaker = A
			text = She held together. I was not sure about that left wheel, but she held together. That is all you can ask.
		}
		LINE
		{
			speaker = A
			text = Surface mobility changes everything. You are not stuck where you land anymore — the whole ground is yours. I will start working on the next model. Bigger wheels, maybe some headlights.
		}
	}

	// DEPRECATED: Replaced by campaign version
	REQUIREMENT
	{
		name = Deprecated
		type = Expression
		expression = false
		title = This contract has been replaced by the campaign version
	}
}
