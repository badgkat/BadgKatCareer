// SuborbitalSpaceplane.cfg — Bridge from aviation to spaceflight

CONTRACT_TYPE
{
	name = BKML_SuborbitalSpaceplane
	group = BadgKatMilestones

	title = Suborbital Spaceplane
	genericTitle = Suborbital Spaceplane
	description = We have pushed aircraft to Mach 5 and the edge of space. The next step is obvious — go all the way. Build a vessel with wings that can leave the atmosphere, touch space, and glide back to a runway landing. No parachutes, no splashdowns. This is a spaceplane.
	synopsis = Reach suborbital space in a winged vessel and return home.
	completedMessage = The spaceplane has landed! Wings took us to space and wings brought us home. The SSTO program is officially underway.

	prestige = Significant
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 45000.0
	rewardReputation = 8.0
	rewardScience = 5.0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = HypersonicOrEdge
		type = Any

		REQUIREMENT
		{
			name = HypersonicDone
			type = CompleteContract
			contractType = BKML_Hypersonic
		}

		REQUIREMENT
		{
			name = EdgeOfSpaceDone
			type = CompleteContract
			contractType = BKML_EdgeOfSpace
		}
	}

	PARAMETER
	{
		name = SuborbitalSpaceplaneParam
		type = VesselParameterGroup
		title = Suborbital spaceplane flight

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = ReachSpace
			type = ReachState
			situation = SUB_ORBITAL
			title = Reach suborbital space
		}
	}

	PARAMETER
	{
		name = ReturnHome
		type = ReturnHome
		title = Return home safely
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Runway to Space

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = idle
		characterAColor = #FF82B4E8

		characterBName = Gus
		characterBModel = Strategy_MechanicGuy
		characterBAnimation = idle
		characterBColor = #FFFFC078

		LINE
		{
			speaker = A
			text = A spaceplane. One vehicle that takes off from a runway, flies to space, and lands back on the same runway. No stages dropped in the ocean, no parachutes, no recovery boats. Everything comes home.
		}
		LINE
		{
			speaker = B
			text = You are describing an airplane that is also a rocket. Those are two things that do not like being the same thing.
		}
		LINE
		{
			speaker = A
			text = The air-breathing engines do the heavy lifting in the atmosphere — they are efficient because they use the air itself as oxidizer. Then at high altitude where the air thins out, you switch to rockets for the final push to space. Two engine types, one vehicle.
		}
		LINE
		{
			speaker = B
			text = She is going to need a lot of thermal protection. Things get hot past Mach 5. I will reinforce the leading edges.
		}
	}
}
