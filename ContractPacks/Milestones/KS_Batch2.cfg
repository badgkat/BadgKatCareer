// KS_Batch2.cfg — Kerbin Side bases, jet engine range (~800-3500km)
// Requires: SoundBarrier complete, Kerbin Side Remastered installed

// ============================================================================
// BAIKERBANUR / KSC2 (~850km from KSC)
// ============================================================================
CONTRACT_TYPE:NEEDS[KerbinSideRemastered]
{
	name = BKML_KS_Baikerbanur
	group = BadgKatMilestones

	title = Fly to Baikerbanur
	genericTitle = Visit a Kerbin Side base
	description = Baikerbanur — also known as KSC2 — is a full space center in the western highlands. Runway, launch pad, the works. Some say it was built as a backup in case KSC was ever destroyed. Others say it was built because Gene wanted a vacation home with a runway. Either way, it is a serious facility.
	synopsis = Fly to Baikerbanur and land.
	completedMessage = Landed at Baikerbanur! This place is impressive — a complete space center in the middle of nowhere. Gene denies the vacation home rumors.

	prestige = Significant
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 25000.0
	rewardReputation = 5.0
	rewardScience = 0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = SoundBarrierDone
		type = CompleteContract
		contractType = BKML_SoundBarrier
	}

	BEHAVIOUR
	{
		name = WaypointGenerator
		type = WaypointGenerator

		WAYPOINT
		{
			name = Baikerbanur
			icon = marker
			latitude = 20.6397
			longitude = -146.4786
			altitude = 0
		}
	}

	PARAMETER
	{
		name = FlyToBase
		type = VesselParameterGroup
		title = Fly to Baikerbanur and land

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = ReachBase
			type = VisitWaypoint
			index = 0
			distance = 500
			title = Reach Baikerbanur (within 500m)
		}

		PARAMETER
		{
			name = LandSafely
			type = ReachState
			situation = LANDED
			title = Land safely
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Baikerbanur

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = idle
		characterAColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = Baikerbanur — the other space center. They have been launching longer than us, though they will not admit their success rate.
		}
	}
}

