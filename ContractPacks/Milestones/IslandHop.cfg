// IslandHop.cfg — Fly to the Island Airfield (~50km)

CONTRACT_TYPE
{
	name = BKML_IslandHop
	group = BadgKatMilestones

	title = Island Hop — Fly to the Island Airfield
	genericTitle = Fly to the Island Airfield
	description = There is a runway across the bay from KSC — the Island Airfield. It is only about 50 kilometers away, but getting there by air and landing in one piece is a real test of aircraft design and piloting skill. Pack enough fuel, keep the wings level, and try not to overshoot the runway.
	synopsis = Fly a winged vessel to the Island Airfield and land.
	completedMessage = Touchdown at the Island Airfield! That is our first successful cross-country flight. The locals are waving from the beach.

	prestige = Significant
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 20000.0
	rewardReputation = 5.0
	rewardScience = 0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = FirstFlightDone
		type = CompleteContract
		contractType = BKEX_FlyToIsland
	}

	BEHAVIOUR
	{
		name = WaypointGenerator
		type = WaypointGenerator

		WAYPOINT
		{
			name = Island Airfield
			icon = marker
			latitude = -1.52
			longitude = -71.97
			altitude = 0
		}
	}

	PARAMETER
	{
		name = IslandHopParam
		type = VesselParameterGroup
		title = Fly to the Island Airfield and land

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = ReachIsland
			type = VisitWaypoint
			index = 0
			distance = 500
			title = Reach the Island Airfield (within 500m)
		}

		PARAMETER
		{
			name = LandSafely
			type = ReachState
			situation = LANDED
			title = Land safely
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Cross-Country

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = idle
		characterAColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = There is an airfield on the island east of KSC. Short hop over the water. Navigation practice — follow the heading and keep the altitude steady. Try to land on the actual runway.
		}
	}

	// DEPRECATED: Replaced by BKEX_FlyToIsland in CampaignOpening.cfg
	REQUIREMENT
	{
		name = Deprecated
		type = Expression
		expression = false
		title = This contract has been replaced by the campaign version
	}
}
