// Mach3.cfg — SR-71 territory (Mach 3 = 1029 m/s)

CONTRACT_TYPE
{
	name = BKML_Mach3
	group = BadgKatMilestones

	title = Mach 3 — Into the Heat
	genericTitle = Reach Mach 3
	description = Breaking the sound barrier was impressive. Now R&D wants to triple it. Mach 3 puts us in the realm of the legendary SR-71 — the kind of speed where the airframe heats up and the sky starts turning dark. We will need better engines, better aerodynamics, and a pilot with nerves of steel.
	synopsis = Exceed Mach 3 (1029 m/s) in a winged vessel.
	completedMessage = Mach 3 achieved! The aircraft returned trailing heat shimmer and the pilot returned trailing confidence. At this speed, the horizon curves. The SSTO team is taking notes.

	prestige = Significant
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 35000.0
	rewardReputation = 8.0
	rewardScience = 3.0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = SoundBarrierDone
		type = CompleteContract
		contractType = BKML_SoundBarrier
	}

	PARAMETER
	{
		name = Mach3Param
		type = VesselParameterGroup
		title = Reach Mach 3

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = GoFaster
			type = ReachState
			situation = FLYING
			minSpeed = 1029
			title = Exceed 1029 m/s (Mach 3)
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = Mach 3

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = true_nodA
		characterAColor = #FF82B4E8

		LINE
		{
			speaker = A
			text = Mach 3 — three times the speed of sound. At this velocity, the air itself becomes the enemy. Friction heats the airframe until the leading edges glow. The SR-71 Blackbird cruised at this speed. Our pilot just joined very exclusive company.
		}
	}
}
