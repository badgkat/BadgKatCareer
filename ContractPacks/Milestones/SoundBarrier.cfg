// SoundBarrier.cfg — Break the sound barrier (Mach 1 = 343 m/s)

CONTRACT_TYPE
{
	name = BKML_SoundBarrier
	group = BadgKatMilestones

	title = Break the Sound Barrier
	genericTitle = Break the Sound Barrier
	description = Our aircraft can fly, but can they fly FAST? The engineers want to know what happens when we push past Mach 1. The ground crew has been warned about the sonic boom. Jeb has been warned about pulling too hard on the stick. Neither will listen.
	synopsis = Exceed Mach 1 (343 m/s) in a winged vessel.
	completedMessage = BOOM! The sonic barrier has been shattered! Windows at KSC rattled, car alarms went off in the parking lot, and Jeb is asking when they can go faster.

	prestige = Significant
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 20000.0
	rewardReputation = 5.0
	rewardScience = 2.0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = FirstFlightDone
		type = CompleteContract
		contractType = BKML_FirstFlight
	}

	PARAMETER
	{
		name = SoundBarrierParam
		type = VesselParameterGroup
		title = Break the sound barrier

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = GoFast
			type = ReachState
			situation = FLYING
			minSpeed = 343
			title = Exceed 343 m/s (Mach 1)
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = Mach 1

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = true_smileA
		characterAColor = #FF82B4E8

		characterBName = Gene
		characterBModel = Instructor_Gene
		characterBAnimation = true_nodA
		characterBColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = In 1947, a pilot named Chuck Yeager flew faster than sound for the first time. They said the airplane would shake apart at the barrier. It did not. Yours did not either.
		}
		LINE
		{
			speaker = B
			text = The windows at KSC rattled. I think Mortimer's coffee mug fell off his desk.
		}
		LINE
		{
			speaker = A
			text = Mach 1 — 343 meters per second at sea level. "Mach" is simply your speed divided by the speed of sound. Past Mach 1, you outrun your own noise. The sonic boom you heard is the sound catching up all at once.
		}
	}
}
