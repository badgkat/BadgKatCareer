// LaytheSSTO.cfg — The ultimate aviation achievement
// Fly a winged vessel in the atmosphere of another world.
// Works with any atmospheric body — Laythe, Tekto (OPM), or modded bodies.
// Repeatable: one completion per body.

CONTRACT_TYPE
{
	name = BKML_ExoFlight
	group = BadgKatMilestones

	title = Wings on Another World — Fly on @/targetBody1
	genericTitle = Fly on an alien world
	description = The atmosphere of @/targetBody1 is thick enough to fly in. Everything the aviation program has built toward leads to moments like this — from the first wobbly flight at KSC to wings on an alien world. Get a spaceplane there and fly in its skies. This is what the entire program was for.
	genericDescription = Fly a winged vessel in the atmosphere of another world.
	synopsis = Fly a winged vessel in the atmosphere of @/targetBody1.
	completedMessage = Wings on @/targetBody1! A kerbal is flying through an alien sky. The entire space program — every test flight, every speed record, every failed landing — led to this moment. Someone at KSC is definitely crying. Several someones.

	prestige = Exceptional
	targetBody = @/targetBody1
	maxCompletions = 0

	rewardFunds = 120000.0
	rewardReputation = 25.0
	rewardScience = 15.0
	failureFunds = 0
	advanceFunds = 0

	maxSimultaneous = 1

	DATA
	{
		type = CelestialBody
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody1 = ReachedBodies().Where(b => !b.IsHomeWorld() && b.HasAtmosphere() && b.HasSurface()).SelectUnique()
		title = Must have reached a non-homeworld body with a flyable atmosphere
	}

	REQUIREMENT
	{
		name = OrbitalDone
		type = CompleteContract
		contractType = BKML_OrbitalSpaceplane
	}

	REQUIREMENT
	{
		name = HasAtmoBody
		type = Expression
		expression = ReachedBodies().Where(b => !b.IsHomeWorld() && b.HasAtmosphere() && b.HasSurface()).Count() >= 1
		title = Must have reached a body with atmosphere
	}

	PARAMETER
	{
		name = ExoFlightParam
		type = VesselParameterGroup
		title = Fly on @/targetBody1

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = FlyOnBody
			type = ReachState
			targetBody = @/targetBody1
			situation = FLYING
			title = Fly in the atmosphere of @/targetBody1
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Alien Skies

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = idle_wonder
		characterAColor = #FF82B4E8

		LINE
		{
			speaker = A
			text = An atmosphere. Not ours — an alien one. Different composition, different pressure, different temperature. But if the air is thick enough... wings will work. Flying on another world. Think about that.
		}
	}
}
