// Hypersonic.cfg — Mach 5 (1715 m/s), bleeding edge

CONTRACT_TYPE
{
	name = BKML_Hypersonic
	group = BadgKatMilestones

	title = Hypersonic — Mach 5
	genericTitle = Reach Mach 5
	description = The speed records keep falling. Mach 5 is the threshold of hypersonic flight — at this speed the atmosphere is more plasma than air. The line between aircraft and spacecraft is getting very blurry. R&D suspects that the next step after this is orbit itself.
	synopsis = Exceed Mach 5 (1715 m/s) in a winged vessel.
	completedMessage = Mach 5! The aircraft is officially faster than most rockets at this altitude. The pilot reports the sky was black and the ground was a blur. The SSTO program just got its first test data.

	prestige = Exceptional
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 50000.0
	rewardReputation = 10.0
	rewardScience = 5.0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = Mach3Done
		type = CompleteContract
		contractType = BKML_Mach3
	}

	PARAMETER
	{
		name = HypersonicParam
		type = VesselParameterGroup
		title = Reach Mach 5

		PARAMETER
		{
			name = HasWings
			type = PartValidation
			partModule = ModuleLiftingSurface
			minCount = 1
			title = Vessel must have wings
		}

		PARAMETER
		{
			name = HasIntake
			type = PartValidation
			partModule = ModuleResourceIntake
			minCount = 1
			title = Must have an air intake (air-breathing engines only)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must be crewed
		}

		PARAMETER
		{
			name = GoHypersonic
			type = ReachState
			situation = FLYING
			minSpeed = 1715
			title = Exceed 1715 m/s (Mach 5)
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = Hypersonic

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = true_thumbsUp
		characterAColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = Mach 5. Hypersonic. At this speed, the air in front of the aircraft cannot get out of the way fast enough — it compresses into a shockwave that heats everything to plasma temperatures. And our pilot flew straight through it.
		}
	}
}
