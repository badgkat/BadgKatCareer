// FirstSteps.cfg — The very beginning. Unchanged from ExplorationPlus concept.
// These aren't probe vs crewed — they're just "get started."

CONTRACT_TYPE
{
	name = BKEX_FirstScience
	group = BadgKatExploration

	title = Do Some Science!
	genericTitle = Do Some Science!
	description = First things first — we need to test our equipment. Collect some science. Preferably while moving very fast.
	synopsis = Collect science and launch a vessel.
	completedMessage = The data is in! The space program is officially underway.

	prestige = Exceptional
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardScience = 2.6
	rewardReputation = 5.3
	rewardFunds = 10666.0
	failureFunds = 0
	advanceFunds = 0

	PARAMETER
	{
		name = CollectScience
		type = CollectScience
		recoveryMethod = RecoverOrTransmit
		title = Return our first piece of scientific data.
	}

	PARAMETER
	{
		name = FirstLaunch
		type = ReachState
		situation = FLYING
		disableOnStageChange = true
		hideChildren = true
		title = Launch a vessel into the air
	}

	REQUIREMENT
	{
		name = FirstLaunchReq
		type = FirstLaunch
		invertRequirement = true
	}
}

CONTRACT_TYPE
{
	name = BKEX_ReachSpace
	group = BadgKatExploration

	title = Reach for the Stars
	genericTitle = Reach for the Stars
	description = It's time to slip the surly bonds of gravity and touch the stars. Send something — anything — above the atmosphere.
	synopsis = Reach space.
	completedMessage = We made it! The view from up here changes everything.

	prestige = Exceptional
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardScience = 3
	rewardReputation = 6
	rewardFunds = 44000.0
	failureFunds = 0
	advanceFunds = 0

	PARAMETER
	{
		name = ReachSpace
		type = ReachState
		situation = SUB_ORBITAL
		disableOnStateChange = true
	}

	REQUIREMENT
	{
		name = ReachSpaceReq
		type = ReachSpace
		invertRequirement = true
		title = Must not have reached space
	}
}
