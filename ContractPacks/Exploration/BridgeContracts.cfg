// BridgeContracts.cfg — Narrative bridge contracts between campaign acts.
// These are auto-accept, zero-parameter contracts that fire ChatterBox dialogue
// when the player crosses act boundaries. They gate the next story beat.

// ============================================================================
// BRIDGE: BOTH LEADS — After rover monolith + island airfield
// Signals point away from Kerbin. Rockets required. More anomalies found.
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_Bridge_BothLeads
	group = BadgKatExploration

	title = Something Is Pointing at the Sky
	genericTitle = Something Is Pointing at the Sky
	description = The monolith signal and the island airfield investigation have both come in. Linus has been staring at the data for three days straight. He says the signal is structured — it is trying to tell us something.
	synopsis = The two leads converge on a single direction — up.
	completedMessage = The signal is getting louder. Whatever left the monolith, it wanted us to find it.

	prestige = Trivial
	targetBody = HomeWorld()
	maxCompletions = 1
	autoAccept = true

	rewardFunds = 0
	rewardReputation = 0
	rewardScience = 0
	failureFunds = 0
	advanceFunds = 0

	// Bridge contracts need at least one parameter to load.
	// duration = 0 completes on the next CC tick after the dialog closes,
	// so the player experiences: dialog closes → contract done.
	PARAMETER
	{
		name = BridgeComplete
		type = Duration
		duration = 0.1s
		preWaitText = Reviewing data
		waitingText = Reviewing data
		completionText = Data reviewed
	}

	REQUIREMENT
	{
		name = RoverMonolithDone
		type = CompleteContract
		contractType = BKEX_RoverMonolith
	}

	REQUIREMENT
	{
		name = FlyToIslandDone
		type = CompleteContract
		contractType = BKEX_FlyToIsland
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Something Is Pointing at the Sky

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Linus
		characterAModel = Strategy_ScienceGuy
		characterAAnimation = idle
		characterAColor = #FF6ED4C8

		characterBName = Gene
		characterBModel = Instructor_Gene
		characterBAnimation = idle
		characterBColor = #FF8BE08A

		LINE
		{
			speaker = A
			text = The monolith signal — I have been running it through every algorithm I have. It is structured, Gene. Not natural noise, not interference. Something encoded it deliberately. And the geometry of the field lines is pointing up. Off-planet.
		}
		LINE
		{
			speaker = B
			text = So whatever left that thing wants us to follow it somewhere we cannot drive to. We are going to need rockets. Bigger ones than we have built so far. I also had the imaging team pull the orbital survey photos while you were crunching numbers — turns out we are not done with Kerbin yet. There are structures in the desert. Something under the arctic ice. More breadcrumbs, right here at home.
		}
		LINE
		{
			speaker = A
			text = The signal is getting louder, Gene. It has been getting louder since we found the monolith. I do not think we should keep it waiting.
		}
	}
}

// ============================================================================
// BRIDGE: MUN SIGNALS — After relay constellation + crewed home orbit
// The relay network is picking up signals from the Mun.
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_Bridge_MunSignals
	group = BadgKatExploration

	title = The Mun Is Talking
	genericTitle = The Mun Is Talking
	description = The relay network is live, and the first thing it picked up was not from us. Linus has been triangulating the source for a week and he finally has a fix — it is coming from the Mun.
	synopsis = The relay constellation detects a signal from the Mun matching the Kerbin monolith.
	completedMessage = The Mun has a monolith too. The trail continues.

	prestige = Trivial
	targetBody = HomeWorld()
	maxCompletions = 1
	autoAccept = true

	rewardFunds = 0
	rewardReputation = 0
	rewardScience = 0
	failureFunds = 0
	advanceFunds = 0

	PARAMETER
	{
		name = BridgeComplete
		type = Duration
		duration = 0.1s
		preWaitText = Analyzing signals
		waitingText = Analyzing signals
		completionText = Signals analyzed
	}

	REQUIREMENT
	{
		name = RelayConstellationDone
		type = CompleteContract
		contractType = BKMC_RelayConstellation
	}

	REQUIREMENT
	{
		name = CrewedHomeOrbitDone
		type = CompleteContract
		contractType = BKEX_CrewedHomeOrbit
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = The Mun Is Talking

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Linus
		characterAModel = Strategy_ScienceGuy
		characterAAnimation = idle
		characterAColor = #FF6ED4C8

		characterBName = Wernher
		characterBModel = Instructor_Wernher
		characterBAnimation = idle
		characterBColor = #FF82B4E8

		LINE
		{
			speaker = A
			text = The relay network went live and the first thing it picked up was not a test ping from us. It has been picking up a signal from the Mun. I spent a week making sure it was not an artifact. It is not. Same carrier frequency, same encoding structure as the Kerbin monolith.
		}
		LINE
		{
			speaker = B
			text = The frequency match is exact to eleven decimal places. That is not coincidence. Someone built both of them. They are breadcrumbs, Linus — each one pointing to the next.
		}
		LINE
		{
			speaker = A
			text = Should I be excited or terrified?
		}
		LINE
		{
			speaker = B
			text = Both. Simultaneously. The correct response is both. We send probes first — map it from orbit, get surface imagery. Then boots on the ground. But we go. We absolutely go.
		}
	}
}

// ============================================================================
// BRIDGE: TRACE SIGNAL — After Mun monolith + Kerbin anomalies
// Triangulation puts the trail's origin at Duna and Eve.
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_Bridge_TraceSignal
	group = BadgKatExploration

	title = The Trail Goes Interplanetary
	genericTitle = The Trail Goes Interplanetary
	description = Linus has been triangulating the signal network for months. He finally has enough data points — the Kerbin monolith, the Mun monolith, the Kerbin anomalies. The signals do not just point up. They point somewhere specific.
	synopsis = Triangulation reveals the signal trail leads to Duna and Eve.
	completedMessage = The breadcrumbs lead beyond the Mun. Time to learn about transfer windows.

	prestige = Trivial
	targetBody = HomeWorld()
	maxCompletions = 1
	autoAccept = true

	rewardFunds = 0
	rewardReputation = 0
	rewardScience = 0
	failureFunds = 0
	advanceFunds = 0

	PARAMETER
	{
		name = BridgeComplete
		type = Duration
		duration = 0.1s
		preWaitText = Triangulating signals
		waitingText = Triangulating signals
		completionText = Triangulation complete
	}

	// At least one Mun monolith variant completed
	REQUIREMENT
	{
		name = MunMonolithDone
		type = Any

		REQUIREMENT
		{
			type = CompleteContract
			contractType = AS_Mun_Monolith.0
		}

		REQUIREMENT
		{
			type = CompleteContract
			contractType = AS_Mun_Monolith.1
		}

		REQUIREMENT
		{
			type = CompleteContract
			contractType = AS_Mun_Monolith.2
		}

		REQUIREMENT
		{
			type = CompleteContract
			contractType = AS_Mun_Monolith.3
		}
	}

	// Need at least 2 Kerbin anomalies completed
	REQUIREMENT
	{
		name = KerbinAnomalies
		type = AtLeast
		count = 2

		REQUIREMENT
		{
			type = CompleteContract
			contractType = AS_Kerbin_Pyramids
		}

		REQUIREMENT
		{
			type = CompleteContract
			contractType = AS_Kerbin_UFO
		}

		REQUIREMENT
		{
			type = CompleteContract
			contractType = AS_Kerbin_Monolith_Additional.0
		}

		REQUIREMENT
		{
			type = CompleteContract
			contractType = AS_Kerbin_Monolith_Additional.1
		}

		REQUIREMENT
		{
			type = CompleteContract
			contractType = AS_Kerbin_Monolith_Additional.2
		}

		REQUIREMENT
		{
			type = CompleteContract
			contractType = AS_Kerbin_Monolith_Additional.3
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = The Trail Goes Interplanetary

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = idle
		characterAColor = #FF82B4E8

		characterBName = Linus
		characterBModel = Strategy_ScienceGuy
		characterBAnimation = idle
		characterBColor = #FF6ED4C8

		LINE
		{
			speaker = B
			text = I triangulated everything. Every data point I have — the Kerbin monolith, the Mun monolith, the pyramids, the ice structure, all of it. The signal vectors converge. Two intersection points. Duna and Eve.
		}
		LINE
		{
			speaker = A
			text = Interplanetary. They started in our own backyard, moved to our moon, and now they are pointing at other planets. Whoever left these things wanted to see if we could build machines capable of getting there. The trail goes from backyard to Mun to solar system. It is a test of our reach.
		}
		LINE
		{
			speaker = B
			text = Can we? Get there, I mean?
		}
		LINE
		{
			speaker = A
			text = Yes. But not by pointing at where Duna is now — you fly to where Duna will be when you arrive. We call them transfer windows. They open on a schedule, like trains, and they close again. Miss the window and you wait. Probes first — they are patient travelers and cheap to lose.
		}
	}
}

// ============================================================================
// BRIDGE: GOING DEEPER — After Duna anomaly discoveries
// The trail does not end at Duna. It points further — to Jool.
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_Bridge_GoingDeeper
	group = BadgKatExploration

	title = The Trail Does Not End
	genericTitle = The Trail Does Not End
	description = The Duna data is in and Linus has been very quiet for two days. That is never a good sign. Or possibly a very exciting one. He says the Duna anomaly signatures point further out — toward the gas giants.
	synopsis = Duna anomaly data reveals the signal trail continues toward Jool.
	completedMessage = Jool. The trail leads to Jool. Better start planning long missions.

	prestige = Trivial
	targetBody = HomeWorld()
	maxCompletions = 1
	autoAccept = true

	rewardFunds = 0
	rewardReputation = 0
	rewardScience = 0
	failureFunds = 0
	advanceFunds = 0

	PARAMETER
	{
		name = BridgeComplete
		type = Duration
		duration = 0.1s
		preWaitText = Analyzing Duna data
		waitingText = Analyzing Duna data
		completionText = Analysis complete
	}

	REQUIREMENT
	{
		name = DunaAnomalyDone
		type = Any

		REQUIREMENT
		{
			name = DunaFaceDone
			type = CompleteContract
			contractType = AS_Duna_Face
		}

		REQUIREMENT
		{
			name = DunaMSLDone
			type = CompleteContract
			contractType = AS_Duna_MSL
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = The Trail Does Not End

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Linus
		characterAModel = Strategy_ScienceGuy
		characterAAnimation = idle
		characterAColor = #FF6ED4C8

		characterBName = Wernher
		characterBModel = Instructor_Wernher
		characterBAnimation = idle
		characterBColor = #FF82B4E8

		LINE
		{
			speaker = A
			text = The Duna data has the same base signature. I was hoping it would be the end of the trail — that Duna was the destination. It is not. The field geometry points outward. Toward the gas giants. Toward Jool.
		}
		LINE
		{
			speaker = B
			text = The trail does not end. Each monolith points further out. Kerbin to the Mun, the Mun to the inner planets, the inner planets to the outer system. They are not just breadcrumbs — they are testing how far we will go. How far we are willing to go.
		}
		LINE
		{
			speaker = A
			text = Jool is a very long way.
		}
		LINE
		{
			speaker = B
			text = Years, at minimum. Round trips take years. But that is what probes are for — we send the machines first, they wait patiently in orbit, they do not need Snacks. The universe has been here for thirteen billion years. It is patient. We can afford to be methodical.
		}
	}
}
