// EarlyCrewed.cfg — Early crewed milestones
// Upper atmosphere and suborbital crewed flights, gated behind unmanned equivalents.

// ============================================================================
// CREWED UPPER ATMOSPHERE — Not quite space, but higher than planes
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_CrewedUpperAtmo
	group = BadgKatExploration

	title = Crewed: Upper Atmosphere
	genericTitle = Send a crew to the upper atmosphere
	description = The probes have shown us the sky above. Now it is time to put a kerbal up there — not all the way to space, not yet, but high enough that the sky turns dark and the ground gets small. Fly a crewed vessel above 18,000 meters. This is the first step toward putting kerbals in space.
	synopsis = Fly a crewed vessel above 18,000m in the atmosphere.
	completedMessage = The crew has seen the curve of the horizon and the darkness above. They are back safely, and their report is simple — they want to go higher. Much higher.

	prestige = Significant
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 20000.0
	rewardReputation = 5.0
	rewardScience = 2.0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = UnmannedSuborbitalDone
		type = CompleteContract
		contractType = BKEX_UnmannedSuborbital
	}

	PARAMETER
	{
		name = CrewedUpperAtmoParam
		type = VesselParameterGroup
		title = Crewed upper atmosphere flight

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must have at least 1 crew member
		}

		PARAMETER
		{
			name = HighAlt
			type = ReachState
			situation = FLYING
			minAltitude = 18000
			title = Fly above 18,000m in atmosphere
		}
	}

	PARAMETER
	{
		name = ReturnHome
		type = ReturnHome
		title = Return crew safely home
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = First Crew

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = idle
		characterAColor = #FF8BE08A

		characterBName = Walt
		characterBModel = Strategy_PRGuy
		characterBAnimation = idle
		characterBColor = #FFC8A0E8

		LINE
		{
			speaker = A
			text = Up until now, we have been sending machines. Today we send a kerbal. Not to space — not yet — but high enough that the sky turns dark and the horizon curves. Eighteen thousand meters.
		}
		LINE
		{
			speaker = B
			text = Gene! Walt Kerman, Public Relations. The media is going to LOVE this. I am already drafting the headline — "Kerbal Touches the Edge of Forever." No wait — "One Small Step Into the Very High Air." I will workshop it.
		}
		LINE
		{
			speaker = A
			text = ...this is Walt. He handles the press.
		}
		LINE
		{
			speaker = B
			text = The public wants heroes, Gene. Give me a kerbal in a capsule with a view and I will give you front page coverage for a week.
		}
		LINE
		{
			speaker = A
			text = Let us focus on getting them back in one piece first. That is the part the press really cares about.
		}
	}
}

// ============================================================================
// CREWED SUBORBITAL — First kerbal in space
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_CrewedSuborbital
	group = BadgKatExploration

	title = Crewed: Reach Space
	genericTitle = Send a crew to space
	description = Probes have reached space. Crews have reached the upper atmosphere. Now it is time for the big one — send a kerbal to suborbital space and bring them home safely. This is the moment the space program has been building toward. The whole world will be watching.
	synopsis = Send a crewed vessel to suborbital space and return safely.
	completedMessage = A kerbal has been to space and lived to tell about it! The capsule is recovered, the crew is grinning, and the space program has just changed forever. Next stop — orbit.

	prestige = Exceptional
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardFunds = 50000.0
	rewardReputation = 10.0
	rewardScience = 5.0
	failureFunds = 0
	advanceFunds = 0

	REQUIREMENT
	{
		name = UnmannedSuborbitalDone
		type = CompleteContract
		contractType = BKEX_UnmannedSuborbital
	}

	REQUIREMENT
	{
		name = CrewedUpperAtmoDone
		type = CompleteContract
		contractType = BKEX_CrewedUpperAtmo
	}

	PARAMETER
	{
		name = CrewedSuborbitalParam
		type = VesselParameterGroup
		title = Crewed suborbital flight

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must have at least 1 crew member
		}

		PARAMETER
		{
			name = ReachSpace
			type = ReachState
			situation = SUB_ORBITAL
			title = Reach suborbital space
		}
	}

	PARAMETER
	{
		name = ReturnHome
		type = ReturnHome
		title = Return crew safely home
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = The Big One

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = idle_sadA
		characterAColor = #FF8BE08A

		characterBName = Wernher
		characterBModel = Instructor_Wernher
		characterBAnimation = idle
		characterBColor = #FF82B4E8

		LINE
		{
			speaker = A
			text = This is the one we have been building toward. A kerbal. In space. Not a probe, not an instrument — a person, sitting on top of a rocket, trusting us to bring them home.
		}
		LINE
		{
			speaker = B
			text = In 1961, Yuri Gagarin rode a modified missile to orbit. When asked if he was scared, he said "Should I be?" He was a test pilot. So are ours.
		}
		LINE
		{
			speaker = A
			text = Suborbital first. Up past the atmosphere, a few minutes of weightlessness, then back down. The hard part is not getting up there. The hard part is the coming home part.
		}
		LINE
		{
			speaker = B
			text = The heat shield will handle reentry. Probably. I ran the numbers twice.
		}
		LINE
		{
			speaker = A
			text = ...not helping, Wernher.
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = A Kerbal Has Been to Space

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Gene
		characterAModel = Instructor_Gene
		characterAAnimation = true_thumbsUp
		characterAColor = #FF8BE08A

		characterBName = Wernher
		characterBModel = Instructor_Wernher
		characterBAnimation = true_thumbsUp
		characterBColor = #FF82B4E8

		LINE
		{
			speaker = A
			text = They are home. They are safe. A kerbal has been to space and come back to tell about it.
		}
		LINE
		{
			speaker = B
			text = Today a kerbal saw the black sky and the curved horizon. They know something now that the rest of us can only imagine.
		}
		LINE
		{
			speaker = A
			text = I am not going to pretend that was easy for me. But it was worth it. Every bit of it was worth it.
		}
	}
}
