// CrewedExploration.cfg — Crewed missions follow probes
// Higher rewards, higher requirements. You need trained crew, life support,
// and return capability. These are the prestige missions.

// ============================================================================
// CREWED ORBIT — Follow up the probe with kerbals
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_CrewedOrbit
	group = BadgKatExploration

	title = Crewed: Orbit @/targetBody1
	genericTitle = Send a crew to orbit a new body
	description = Our probe has been orbiting @/targetBody1 and sending back incredible data. Now it's time for the real thing — send a crew out there. They'll see things no camera can capture, make decisions no probe can make, and come home as heroes. This is what the space program is for.
	genericDescription = Send a crewed vessel to orbit a body that has already been probed.
	synopsis = Send a crew with a trained pilot (level 1+) to orbit @/targetBody1 and return home.
	completedMessage = The crew is home! Their firsthand account of @/targetBody1 is already inspiring the next generation. The Academy is flooded with applications.

	prestige = Exceptional
	targetBody = @/targetBody1
	maxCompletions = 0

	rewardScience = 8
	rewardReputation = 12
	rewardFunds = 80000.0
	failureReputation = 10
	failureFunds = 40000.0
	advanceFunds = 30000.0

	DATA
	{
		type = CelestialBody
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody1 = OrbitedBodies().Where(b => !b.IsHomeWorld()).SelectUnique()
		title = Must have orbited a non-homeworld body (probe counts)
	}

	// Gate: must have orbited with a probe first
	REQUIREMENT
	{
		name = ProbeWentFirst
		type = Orbit
		targetBody = @/targetBody1
		title = Must have already orbited this body
	}

	// Must have trained pilots
	REQUIREMENT
	{
		name = HasTrainedPilot
		type = Expression
		expression = AllKerbals().Where(k => k.ExperienceTrait() == Pilot && k.ExperienceLevel() >= 1 && k.RosterStatus() == Available && k.Type() == Crew).Count() >= 1
		title = Must have a trained pilot (level 1+)
	}

	PARAMETER
	{
		name = CrewedOrbitMission
		type = VesselParameterGroup
		title = Orbit @/targetBody1 with a crew

		PARAMETER
		{
			name = HasPilot
			type = HasCrew
			trait = Pilot
			minExperience = 1
			minCrew = 1
			title = Include a trained Pilot (level 1+)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 2
			title = Minimum 2 crew
		}

		PARAMETER
		{
			name = Orbit
			type = Orbit
			targetBody = @/targetBody1
			situation = ORBITING
			minAltitude = 0
		}
	}

	PARAMETER
	{
		name = ReturnHome
		type = ReturnHome
		title = Return crew safely home
	}
}

// ============================================================================
// CREWED LANDING — The big one. Boots on the ground.
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_CrewedLanding
	group = BadgKatExploration

	title = Crewed: Land on @/targetBody1
	genericTitle = Land a crew on a new body
	description = We've orbited @/targetBody1 with crew and probed the surface. Now it's time for boots on the ground. This is the mission everyone will remember — the one that puts kerbals on a new world and brings them home. It won't be easy. It won't be cheap. But it will be worth it.
	genericDescription = Land a crew on a body that has been probed and orbited by crew.
	synopsis = Land a crew with a skilled pilot (level 2+) on @/targetBody1 and return home.
	completedMessage = They did it. Kerbals have walked on @/targetBody1 and lived to tell the tale. This is the day the history books will remember. The crew is home, the science is extraordinary, and Gene is pretending he's not crying.

	prestige = Exceptional
	targetBody = @/targetBody1
	maxCompletions = 0

	rewardScience = 20
	rewardReputation = 25
	rewardFunds = 150000.0
	failureReputation = 20
	failureFunds = 75000.0
	advanceFunds = 50000.0

	DATA
	{
		type = CelestialBody
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody1 = LandedBodies().Where(b => !b.IsHomeWorld() && b.HasSurface()).SelectUnique()
		title = Must have landed a probe on this body already
	}

	// Gate: probe must have landed first
	REQUIREMENT
	{
		name = ProbeLandedFirst
		type = Landing
		targetBody = @/targetBody1
		title = Must have landed on this body (probe counts)
	}

	// Must have skilled pilots
	REQUIREMENT
	{
		name = HasSkilledPilot
		type = Expression
		expression = AllKerbals().Where(k => k.ExperienceTrait() == Pilot && k.ExperienceLevel() >= 2 && k.RosterStatus() == Available && k.Type() == Crew).Count() >= 1
		title = Must have a skilled pilot (level 2+)
	}

	PARAMETER
	{
		name = CrewedLandingMission
		type = VesselParameterGroup
		title = Land on @/targetBody1 with a crew

		PARAMETER
		{
			name = HasPilot
			type = HasCrew
			trait = Pilot
			minExperience = 2
			minCrew = 1
			title = Include a skilled Pilot (level 2+)
		}

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 2
			title = Minimum 2 crew
		}

		PARAMETER
		{
			name = Landing
			type = ReachState
			targetBody = @/targetBody1
			situation = LANDED
		}

		PARAMETER
		{
			name = PlantFlag
			type = PlantFlag
			targetBody = @/targetBody1
			title = Plant a flag on @/targetBody1
		}

		PARAMETER
		{
			name = Science
			type = CollectScience
			targetBody = @/targetBody1
			situation = SrfLanded
			recoveryMethod = RecoverOrTransmit
			title = Collect surface science
		}
	}

	PARAMETER
	{
		name = ReturnHome
		type = ReturnHome
		title = Return crew safely home
	}
}

// ============================================================================
// CREWED HOMEWORLD ORBIT — Special case for the first orbit of home
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_CrewedHomeOrbit
	group = BadgKatExploration

	title = First crewed orbit of homeworld
	genericTitle = First crewed orbit
	description = We've sent probes up, we've sent kerbals on suborbital hops, but nobody has gone all the way around yet. It's time. Send a crew to orbit and bring them home safely. This is the mission that proves we're ready for the rest of the solar system.
	synopsis = Orbit homeworld with a crew and return safely.
	completedMessage = One orbit complete. The crew saw the entire world from above. Everything changes now.

	prestige = Exceptional
	targetBody = HomeWorld()
	maxCompletions = 1

	rewardScience = 5
	rewardReputation = 15
	rewardFunds = 60000.0
	failureReputation = 10
	failureFunds = 30000.0
	advanceFunds = 20000.0

	// Only after we've orbited with a probe
	REQUIREMENT
	{
		name = HasOrbited
		type = Orbit
		targetBody = HomeWorld()
	}

	// But haven't sent crew to orbit yet
	REQUIREMENT
	{
		name = NotCrewedOrbit
		type = Expression
		// This will be offered once — after probe orbit, before crewed orbit
		expression = true
		title = Available after first probe orbit of homeworld
	}

	PARAMETER
	{
		name = CrewedOrbit
		type = VesselParameterGroup
		title = Orbit homeworld with a crew

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 1
			title = Must have at least 1 crew member
		}

		PARAMETER
		{
			name = Orbit
			type = Orbit
			targetBody = HomeWorld()
			situation = ORBITING
			minAltitude = 0
		}
	}

	PARAMETER
	{
		name = ReturnHome
		type = ReturnHome
		title = Return crew safely home
	}
}
