// ProbeExploration.cfg — Unmanned probe missions
// Probes go first. They're cheaper, don't need life support, and can be
// sent on one-way trips. They pave the way for crewed missions.

// ============================================================================
// PROBE ORBIT — First step for any new body
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_ProbeOrbit
	group = BadgKatExploration

	title = Probe: Orbit @/targetBody1
	genericTitle = Send a probe to orbit a new body
	description = Our telescopes and tracking stations have identified @/targetBody1 as a target of interest. Before we risk any kerbals, let's send an unmanned probe to orbit and gather preliminary data. This is how responsible space programs operate — scouts before settlers.
	genericDescription = Send an unmanned probe to orbit a celestial body for the first time.
	synopsis = Place an unmanned probe in orbit around @/targetBody1.
	completedMessage = Probe is in stable orbit around @/targetBody1! Telemetry is coming in. The scientists are already planning follow-up missions.

	prestige = Significant
	targetBody = @/targetBody1
	maxCompletions = 0

	rewardScience = 5
	rewardReputation = 4
	rewardFunds = 30000.0
	failureReputation = 2
	failureFunds = 15000.0
	advanceFunds = 15000.0

	DATA
	{
		type = CelestialBody
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody1 = ReachedBodies().Where(b => !b.HaveOrbited() && !b.IsHomeWorld()).SelectUnique()
		title = Must have reached but not orbited a body
	}

	REQUIREMENT
	{
		name = ReachedSpace
		type = ReachSpace
	}

	PARAMETER
	{
		name = ProbeOrbit
		type = VesselParameterGroup
		title = Orbit @/targetBody1 with a probe

		PARAMETER
		{
			name = IsUnmanned
			type = HasCrew
			maxCrew = 0
			title = Must be unmanned
		}

		PARAMETER
		{
			name = Orbit
			type = Orbit
			targetBody = @/targetBody1
			situation = ORBITING
			minAltitude = 0
		}
	}
}

// ============================================================================
// PROBE LANDING — Scout the surface
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_ProbeLanding
	group = BadgKatExploration

	title = Probe: Land on @/targetBody1
	genericTitle = Land a probe on a new body
	description = Our orbital probe has given us a good look at @/targetBody1 from above. Now it's time to touch down. Send an unmanned lander to the surface and collect data. One-way trip is fine — probes don't need a ride home.
	genericDescription = Land an unmanned probe on a celestial body for the first time.
	synopsis = Land an unmanned probe on @/targetBody1.
	completedMessage = Touchdown confirmed on @/targetBody1! Surface data streaming in. The ground team is ecstatic — this is the first time anything from Kerbin has touched this world.

	prestige = Significant
	targetBody = @/targetBody1
	maxCompletions = 0

	rewardScience = 8
	rewardReputation = 5
	rewardFunds = 40000.0
	failureReputation = 3
	failureFunds = 20000.0
	advanceFunds = 20000.0

	DATA
	{
		type = CelestialBody
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody1 = OrbitedBodies().Where(b => !b.HaveLandedOn() && b.HasSurface() && !b.IsHomeWorld()).SelectUnique()
		title = Must have orbited but not landed on a body with a surface
	}

	// Gate: must have orbited this body first (probe or crewed)
	REQUIREMENT
	{
		name = HasOrbited
		type = Orbit
		targetBody = @/targetBody1
	}

	PARAMETER
	{
		name = ProbeLanding
		type = VesselParameterGroup
		title = Land on @/targetBody1 with a probe

		PARAMETER
		{
			name = IsUnmanned
			type = HasCrew
			maxCrew = 0
			title = Must be unmanned
		}

		PARAMETER
		{
			name = Landing
			type = ReachState
			targetBody = @/targetBody1
			situation = LANDED
		}

		PARAMETER
		{
			name = Science
			type = CollectScience
			targetBody = @/targetBody1
			situation = SrfLanded
			recoveryMethod = RecoverOrTransmit
			title = Collect surface science
		}
	}
}

// ============================================================================
// PROBE FLYBY — For gas giants and hard-to-reach bodies
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_ProbeFlyby
	group = BadgKatExploration

	title = Probe: Flyby of @/targetBody1
	genericTitle = Send a probe on a flyby mission
	description = @/targetBody1 is on our radar but getting into orbit there will be expensive. For now, let's send a probe on a flyby trajectory — a quick pass to gather data and photos before sailing on. Sometimes you don't need to stop to learn.
	genericDescription = Send a probe on a flyby of an unexplored body.
	synopsis = Fly an unmanned probe past @/targetBody1 and collect science.
	completedMessage = Flyby complete! The probe captured stunning images and valuable data as it whipped past @/targetBody1. Planning for a follow-up orbital mission is already underway.

	prestige = Trivial
	targetBody = @/targetBody1
	maxCompletions = 0

	rewardScience = 3
	rewardReputation = 3
	rewardFunds = 20000.0
	failureReputation = 1
	failureFunds = 10000.0
	advanceFunds = 10000.0

	DATA
	{
		type = CelestialBody
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody1 = NextUnreachedBody()
		title = Target the next unreached body
	}

	REQUIREMENT
	{
		name = ReachedSpace
		type = ReachSpace
	}

	PARAMETER
	{
		name = ProbeFlyby
		type = VesselParameterGroup
		title = Flyby @/targetBody1 with a probe

		PARAMETER
		{
			name = IsUnmanned
			type = HasCrew
			maxCrew = 0
			title = Must be unmanned
		}

		PARAMETER
		{
			name = Flyby
			type = ReachState
			targetBody = @/targetBody1
			situation = ESCAPING
			title = Enter @/targetBody1 sphere of influence
		}

		PARAMETER
		{
			name = Science
			type = CollectScience
			targetBody = @/targetBody1
			recoveryMethod = RecoverOrTransmit
			title = Collect science during flyby
		}
	}
}
