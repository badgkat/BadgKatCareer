// ProbeExploration.cfg — Unmanned probe missions
// Probes go first. They're cheaper, don't need life support, and can be
// sent on one-way trips. They pave the way for crewed missions.

// ============================================================================
// PROBE ORBIT — First step for any new body
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_ProbeOrbit
	group = BadgKatExploration

	title = Probe: Orbit @/targetBody1
	genericTitle = Send a probe to orbit a new body
	description = Our telescopes and tracking stations have identified @/targetBody1 as a target of interest. Before we risk any kerbals, let's send an unmanned probe to orbit and gather preliminary data. This is how responsible space programs operate — scouts before settlers.
	genericDescription = Send an unmanned probe to orbit a celestial body for the first time.
	synopsis = Place an unmanned probe in orbit around @/targetBody1.
	completedMessage = Probe is in stable orbit around @/targetBody1! Telemetry is coming in. The scientists are already planning follow-up missions.

	prestige = Significant
	targetBody = @/targetBody1
	maxCompletions = 0

	rewardScience = 5
	rewardReputation = 4
	rewardFunds = 30000.0
	failureReputation = 2
	failureFunds = 15000.0
	advanceFunds = 15000.0

	DATA
	{
		type = CelestialBody
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody1 = ReachedBodies().Where(b => !b.HaveOrbited() && !b.IsHomeWorld()).SelectUnique()
		title = Must have reached but not orbited a body
	}

	REQUIREMENT
	{
		name = ReachedSpace
		type = ReachSpace
	}

	PARAMETER
	{
		name = ProbeOrbit
		type = VesselParameterGroup
		title = Orbit @/targetBody1 with a probe

		PARAMETER
		{
			name = IsUnmanned
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Must be unmanned
		}

		PARAMETER
		{
			name = Orbit
			type = Orbit
			targetBody = @/targetBody1
			situation = ORBITING
			minAltitude = 0
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = Orbital Insertion

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = true_nodA
		characterAColor = #FF82B4E8

		LINE
		{
			speaker = A
			text = Stable orbit confirmed. Our probe is circling a new world, sending data with every pass. Each orbit teaches us something the last one missed.
		}
	}
}

// ============================================================================
// PROBE LANDING — Scout the surface
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_ProbeLanding
	group = BadgKatExploration

	title = Probe: Land on @/targetBody1
	genericTitle = Land a probe on a new body
	description = Our orbital probe has given us a good look at @/targetBody1 from above. Now it's time to touch down. Send an unmanned lander to the surface and collect data. One-way trip is fine — probes don't need a ride home.
	genericDescription = Land an unmanned probe on a celestial body for the first time.
	synopsis = Land an unmanned probe on @/targetBody1.
	completedMessage = Touchdown confirmed on @/targetBody1! Surface data streaming in. The ground team is ecstatic — this is the first time anything from Kerbin has touched this world.

	prestige = Significant
	targetBody = @/targetBody1
	maxCompletions = 0

	rewardScience = 8
	rewardReputation = 5
	rewardFunds = 40000.0
	failureReputation = 3
	failureFunds = 20000.0
	advanceFunds = 20000.0

	DATA
	{
		type = CelestialBody
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody1 = OrbitedBodies().Where(b => !b.HaveLandedOn() && b.HasSurface() && !b.IsHomeWorld()).SelectUnique()
		title = Must have orbited but not landed on a body with a surface
	}

	// Gate: must have orbited this body first (probe or crewed)
	REQUIREMENT
	{
		name = HasOrbited
		type = Orbit
		targetBody = @/targetBody1
	}

	PARAMETER
	{
		name = ProbeLanding
		type = VesselParameterGroup
		title = Land on @/targetBody1 with a probe

		PARAMETER
		{
			name = IsUnmanned
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Must be unmanned
		}

		PARAMETER
		{
			name = Landing
			type = ReachState
			targetBody = @/targetBody1
			situation = LANDED
		}

		PARAMETER
		{
			name = Science
			type = CollectScience
			targetBody = @/targetBody1
			situation = SrfLanded
			recoveryMethod = RecoverOrTransmit
			title = Collect surface science
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = Touchdown

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Linus
		characterAModel = Strategy_ScienceGuy
		characterAAnimation = idle_wonder
		characterAColor = #FF6ED4C8

		LINE
		{
			speaker = A
			text = Surface contact confirmed. The first thing from Kerbin to ever touch this world. The data coming in is... I need a minute. This is a lot.
		}
	}
}

// ============================================================================
// PROBE FLYBY — For gas giants and hard-to-reach bodies
// ============================================================================
CONTRACT_TYPE
{
	name = BKEX_ProbeFlyby
	group = BadgKatExploration

	title = Probe: Flyby of @/targetBody1
	genericTitle = Send a probe on a flyby mission
	description = Our telescopes have spotted @/targetBody1, but getting into orbit there will be expensive. For now, a flyby trajectory will do — a quick pass to gather data and photos before sailing on. Sometimes you do not need to stop to learn.
	genericDescription = Send a probe on a flyby of an unexplored body.
	synopsis = Fly an unmanned probe past @/targetBody1 and collect science.
	completedMessage = Flyby complete! The probe captured stunning images and valuable data as it whipped past @/targetBody1. Planning for a follow-up orbital mission is already underway.

	prestige = Trivial
	targetBody = @/targetBody1
	maxCompletions = 0

	rewardScience = 3
	rewardReputation = 3
	rewardFunds = 20000.0
	failureReputation = 1
	failureFunds = 10000.0
	advanceFunds = 10000.0

	DATA
	{
		type = List<CelestialBody>
		hidden = true
		// Homeworld moons (Mun, Minmus) — always visible in ResearchBodies
		homeMoons = HomeWorld().Children().Where(b => !b.HaveReached())
	}

	DATA
	{
		type = List<CelestialBody>
		hidden = true
		// Everything else: planets, distant moons, modded bodies (OPM, Kcalbeloh, MPE)
		// Excludes homeworld, Sun, and homeworld moons (those are in homeMoons)
		farBodies = AllBodies().Where(b => !b.HaveReached() && !b.IsHomeWorld() && b != HomeWorld().Parent() && b.Parent() != HomeWorld())
	}

	DATA
	{
		type = CelestialBody
		uniquenessCheck = CONTRACT_ACTIVE
		// Mun/Minmus first, then the wider solar system
		targetBody1 = @/homeMoons.Count() > 0 ? @/homeMoons.SelectUnique() : @/farBodies.SelectUnique()
		title = Target the next unreached body (homeworld moons first)
	}

	REQUIREMENT
	{
		name = UnmannedOrbitDone
		type = CompleteContract
		contractType = BKEX_UnmannedOrbit
	}

	PARAMETER
	{
		name = ProbeFlyby
		type = VesselParameterGroup
		title = Flyby @/targetBody1 with a probe

		PARAMETER
		{
			name = IsUnmanned
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Must be unmanned
		}

		PARAMETER
		{
			name = Flyby
			type = ReachState
			targetBody = @/targetBody1
			situation = ESCAPING
			title = Enter @/targetBody1 sphere of influence
		}

		PARAMETER
		{
			name = Science
			type = CollectScience
			targetBody = @/targetBody1
			recoveryMethod = RecoverOrTransmit
			title = Collect science during flyby
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Beyond Home

		presentation = Dialogue
		scale = 0.50
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = idle
		characterAColor = #FF82B4E8

		characterBName = Linus
		characterBModel = Strategy_ScienceGuy
		characterBAnimation = idle
		characterBColor = #FF6ED4C8

		LINE
		{
			speaker = A
			text = We have orbited our homeworld. We have proven that what goes up can stay up. Now we aim for somewhere else entirely. A flyby — our probe will pass close, gather data, and keep going.
		}
		LINE
		{
			speaker = B
			text = A flyby means we do not have to slow down when we get there, right? We just... sail past?
		}
		LINE
		{
			speaker = A
			text = Precisely. Stopping takes fuel — sometimes more fuel than getting there. A flyby trades time for efficiency. The probe arrives fast, collects data during the closest approach, and the gravity of the target bends our path onward.
		}
		LINE
		{
			speaker = B
			text = Gravity can bend a path?
		}
		LINE
		{
			speaker = A
			text = Everything with mass bends the space around it. A planet is a curve in the road. Use it well and you get a free turn. The Voyager probes used this trick to visit four planets with one launch. We can do the same.
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Complete
		type = ChatterBox
		onState = CONTRACT_SUCCESS
		title = First Contact

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Linus
		characterAModel = Strategy_ScienceGuy
		characterAAnimation = idle_wonder
		characterAColor = #FF6ED4C8

		LINE
		{
			speaker = A
			text = The data is coming in. Another world, up close, for the first time. I keep staring at the images. It is real. It is all real and it is right there.
		}
	}
}
