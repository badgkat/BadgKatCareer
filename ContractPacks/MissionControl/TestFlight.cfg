// TestFlight.cfg — REQUIRES Pilot Level 1+
// "Take a new vessel design through its paces."
// This is the GOOD version of PartTest. Instead of "activate this engine
// between 28,000m and 42,000m" (tedious), it's "fly this thing to orbit
// and back in one piece" (fun, tests the whole design).
// Ties into: Academy (Flight School), Crew R&R (pilots need missions)

CONTRACT_TYPE
{
	name = BKMC_TestFlight
	group = BadgKatMissionControl

	title = Test flight: new vessel to @/targetBody orbit
	genericTitle = Conduct a test flight
	description = R&D has a new vessel design they'd like tested. Rather than checking individual parts in absurd conditions, they want a real shakedown flight — take it to @/targetBody orbit and bring it home. We need a trained pilot who can handle any surprises. This is what the Academy trained them for.
	genericDescription = Take a new vessel through a full shakedown flight to orbit and back.
	synopsis = Fly a vessel to @/targetBody orbit and return safely with a trained pilot (level 1+).
	completedMessage = Test flight complete! R&D has the telemetry they need. @/pilot reports the vessel handles well — a few notes for the engineers, but nothing that can't be tweaked. Design approved for operational missions.

	prestige = Trivial
	targetBody = @/targetBody

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 10
	maxExpiry = 30

	rewardFunds = Random(15000.0, 35000.0)
	rewardReputation = Random(2.0, 5.0)
	rewardScience = 2.0
	failureReputation = Random(1.0, 5.0)
	failureFunds = 10000.0
	advanceFunds = 5000.0

	DATA
	{
		type = CelestialBody
		requiredValue = true
		targetBody = OrbitedBodies().Where(b => b.HasSurface()).Random()
		title = Target a body we've orbited before
	}

	DATA
	{
		type = List<Kerbal>
		requiredValue = false
		trainedPilots = AllKerbals().Where(k => k.ExperienceTrait() == Pilot && k.ExperienceLevel() >= 1 && k.RosterStatus() == Available && k.Type() == Crew)
	}

	DATA
	{
		type = Kerbal
		requiredValue = false
		pilot = @/trainedPilots.Count() > 0 ? @/trainedPilots.Random() : null
		hidden = true
	}

	REQUIREMENT
	{
		name = HasTrainedPilot
		type = Expression
		expression = @/trainedPilots.Count() >= 1
		title = Must have at least one Pilot level 1 or higher
	}

	REQUIREMENT
	{
		name = HasOrbited
		type = Expression
		expression = OrbitedBodies().Count() >= 1
		title = Must have orbited at least one body
	}

	// Cooldown
	REQUIREMENT
	{
		name = Cooldown
		type = CompleteContract
		contractType = BKMC_TestFlight
		minCount = 0
		cooldownDuration = 30d
	}

	PARAMETER
	{
		name = TestFlightMission
		type = VesselParameterGroup
		title = Conduct test flight

		PARAMETER
		{
			name = HasPilot
			type = HasCrew
			trait = Pilot
			minExperience = 1
			minCrew = 1
			title = Include a trained Pilot (level 1+)
		}

		PARAMETER
		{
			name = ReachOrbit
			type = Orbit
			targetBody = @/targetBody
			situation = ORBITING
			title = Reach orbit around @/targetBody
		}
	}

	PARAMETER
	{
		name = ReturnHome
		type = ReturnHome
		title = Return the vessel and pilot safely home
	}
}
