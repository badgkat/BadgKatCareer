// DeepSpaceSurvey.cfg — REQUIRES Scientist Level 2+
// "We've discovered a new body. Send a senior scientist for a proper study."
// Ties into: Research Bodies (discovered it), FieldResearch (do science),
//            DMagic/SCANsat (instruments), Academy (need trained scientist)

CONTRACT_TYPE
{
	name = BKMC_DeepSpaceSurvey
	group = BadgKatMissionControl

	title = Deep space scientific survey of @/targetBody
	genericTitle = Conduct a deep space scientific survey
	description = Now that our telescopes have confirmed the existence of @/targetBody, the Science Division is requesting a comprehensive survey mission. This isn't a quick flyby — they want @/scientist or another senior scientist (level 2+) to spend real time in orbit gathering data with multiple instruments. A thorough survey now will inform every future mission to this body.
	genericDescription = Conduct a comprehensive scientific survey of a recently discovered celestial body.
	synopsis = Send a senior scientist (level 2+) to orbit @/targetBody and collect science from multiple experiments.
	completedMessage = Survey data received! The Science Division is ecstatic — @/scientist's report is already changing our understanding of @/targetBody. This data will be referenced for decades. The next generation of scientists will build on this work.

	prestige = Exceptional
	targetBody = @/targetBody

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 30
	maxExpiry = 120

	rewardFunds = Random(60000.0, 120000.0)
	rewardReputation = Random(8.0, 20.0)
	rewardScience = 25.0
	failureReputation = Random(5.0, 12.0)
	failureFunds = 30000.0
	advanceFunds = 30000.0

	// No hard deadline — science takes time
	// deadline = 0

	DATA
	{
		type = CelestialBody
		requiredValue = true
		uniquenessCheck = GROUP_ACTIVE
		// Bodies we've orbited but haven't landed on — ripe for detailed study
		targetBody = OrbitedBodies().Where(b => !b.HaveLandedOn() && !b.IsHomeWorld()).SelectUnique()
		title = Must have an orbited but unlanded body
	}

	DATA
	{
		type = List<Kerbal>
		requiredValue = false
		seniorScientists = AllKerbals().Where(k => k.ExperienceTrait() == Scientist && k.ExperienceLevel() >= 2 && k.RosterStatus() == Available && k.Type() == Crew)
	}

	DATA
	{
		type = Kerbal
		requiredValue = false
		scientist = @/seniorScientists.Count() > 0 ? @/seniorScientists.Random() : null
		hidden = true
	}

	REQUIREMENT
	{
		name = HasSeniorScientist
		type = Expression
		expression = @/seniorScientists.Count() >= 1
		title = Must have at least one Scientist level 2 or higher
	}

	REQUIREMENT
	{
		name = OrbitedBeyondHome
		type = Expression
		expression = OrbitedBodies().Where(b => !b.IsHomeWorld()).Count() >= 1
		title = Must have orbited a body beyond homeworld
	}

	PARAMETER
	{
		name = SurveyMission
		type = VesselParameterGroup
		title = Conduct survey of @/targetBody

		PARAMETER
		{
			name = HasSeniorScientist
			type = HasCrew
			trait = Scientist
			minExperience = 2
			minCrew = 1
			title = Include a senior Scientist (level 2+)
		}

		PARAMETER
		{
			name = OrbitTarget
			type = Orbit
			targetBody = @/targetBody
			situation = ORBITING
			title = Enter orbit around @/targetBody
		}

		PARAMETER
		{
			name = CollectScience1
			type = CollectScience
			targetBody = @/targetBody
			situation = InSpaceLow
			recoveryMethod = RecoverOrTransmit
			title = Collect low orbit science
		}

		PARAMETER
		{
			name = CollectScience2
			type = CollectScience
			targetBody = @/targetBody
			situation = InSpaceHigh
			recoveryMethod = RecoverOrTransmit
			title = Collect high orbit science
		}
	}
}
