// CrewRotation.cfg
// "The crew aboard [station] has been up there for a while.
//  Time for a fresh crew — and bring the old ones home."
//
// Triggers when: You have a crewed station
// Requires: Bring new crew, return old crew to Kerbin
// Stakes: Ties into Crew R&R — returned crew needs rest
// Ties into: KerbinSpaceStation, Crew R&R, TourismExpanded (similar docking)

CONTRACT_TYPE
{
	name = BKMC_CrewRotation
	group = BadgKatMissionControl

	title = Crew rotation for @/targetStation
	genericTitle = Perform a crew rotation
	description = The crew aboard @/targetStation has been requesting some fresh faces. Gene says they've been up there long enough that they've started naming the bolts. Time to send up a replacement crew and bring the veterans home for some well-deserved R&R.
	genericDescription = A station crew has been deployed too long and needs rotation.
	synopsis = Send a fresh crew to @/targetStation and return the current crew home.
	completedMessage = Crew swap complete! The returning crew is already arguing about who gets the first shower.

	prestige = Trivial
	targetBody = @/targetStation.CelestialBody()

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 30
	maxExpiry = 90

	rewardFunds = Random(20000.0, 50000.0)
	rewardReputation = Random(3.0, 8.0)
	rewardScience = 0
	failureReputation = Random(2.0, 6.0)
	failureFunds = 15000.0
	advanceFunds = 20000.0

	deadline = Random(120, 300)

	DATA
	{
		type = Vessel
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		targetStation = AllVessels().Where(v => v.VesselType() == Station && v.CrewCount() >= 2).SelectUnique()
		title = Must have a station with at least 2 crew
	}

	REQUIREMENT
	{
		name = HasCrewedStation
		type = Expression
		expression = AllVessels().Where(v => v.VesselType() == Station && v.CrewCount() >= 2).Count() >= 1
		title = Must have at least one station with 2+ crew
	}

	// Don't offer at the very start
	REQUIREMENT
	{
		name = ReachedSpace
		type = Expression
		expression = OrbitedBodies().Count() >= 1
		title = Must have orbited at least one body
	}

	PARAMETER
	{
		name = RotationMission
		type = VesselParameterGroup
		title = Perform crew rotation at @/targetStation

		PARAMETER
		{
			name = HasCrew
			type = HasCrew
			minCrew = 2
			title = Bring at least 2 replacement crew
		}

		PARAMETER
		{
			name = DockWithStation
			type = Docking
			vessel = @/targetStation
			title = Dock with @/targetStation
		}
	}

	// Also need to bring someone home
	PARAMETER
	{
		name = ReturnCrew
		type = ReturnHome
		title = Return crew safely home
	}
}
