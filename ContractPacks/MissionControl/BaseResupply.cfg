// BaseResupply.cfg
// "The base on [body] is running low on Snacks.
//  Unlike stations, you can land a supply pod directly."
//
// Same idea as station resupply but for surface bases.
// Requires landing, not docking — different gameplay.
// Ties into: KPBS bases, Sandcastle manufacturing, Snacks

CONTRACT_TYPE
{
	name = BKMC_BaseResupply
	group = BadgKatMissionControl

	title = Resupply the @/targetBody surface base
	genericTitle = Resupply a surface base
	description = The crew at our @/targetBody base reports they're running low on essentials. They've been making do, but Bob says if he has to eat recycled snack crumbs one more time he's walking home. Send a supply lander with fresh Snacks.
	genericDescription = A surface base needs supplies delivered.
	synopsis = Land a supply vessel near the @/targetBody base with Snacks.
	completedMessage = Supplies delivered! The base crew is thrilled. Jeb immediately claimed the gummy worms. Some things never change, even on other worlds.

	prestige = Trivial
	targetBody = @/targetBase.CelestialBody()

	agent = Mission Control

	maxSimultaneous = 2
	maxCompletions = 0

	minExpiry = 30
	maxExpiry = 90

	rewardFunds = Random(25000.0, 60000.0)
	rewardReputation = Random(2.0, 6.0)
	rewardScience = 0
	failureReputation = Random(3.0, 8.0)
	failureFunds = 15000.0
	advanceFunds = 15000.0

	deadline = Random(120, 240)

	DATA
	{
		type = Vessel
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		targetBase = AllVessels().Where(v => v.VesselType() == Base && v.CrewCount() > 0).SelectUnique()
		title = Must have a crewed surface base
	}

	REQUIREMENT
	{
		name = HasBase
		type = Expression
		expression = AllVessels().Where(v => v.VesselType() == Base && v.CrewCount() > 0).Count() >= 1
		title = Must have at least one crewed base
	}

	REQUIREMENT:NEEDS[Snacks]
	{
		name = SnacksCheck
		type = PartModuleTypeUnlocked
		partModuleType = Converter
	}

	PARAMETER
	{
		name = SupplyLander
		type = VesselParameterGroup
		title = Deliver supplies to @/targetBody

		PARAMETER
		{
			name = HasSnacks
			type = HasResource
			resource = Snacks
			minQuantity = 200
			title = Carry at least 200 units of Snacks
		}

		PARAMETER
		{
			name = LandNearBase
			type = ReachState
			targetBody = @/targetBase.CelestialBody()
			situation = LANDED
			title = Land on @/targetBase.CelestialBody()
		}
	}
}
