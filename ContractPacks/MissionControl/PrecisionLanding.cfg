// PrecisionLanding.cfg — REQUIRES Pilot Level 2+
// "We need supplies delivered to a specific location."
// Gives pilots real purpose — precision flying matters.
// Replaces the terrible stock PartTest with something that tests SKILL.
// Ties into: Academy (Flight School), base building, resupply

CONTRACT_TYPE
{
	name = BKMC_PrecisionLanding
	group = BadgKatMissionControl

	title = Precision landing on @/targetBody
	genericTitle = Precision landing mission
	description = Mission Control needs a precision landing near a specific site on @/targetBody. This could be a base resupply, equipment delivery, or landing zone survey. Either way, we need a skilled pilot — someone who can put a vessel down where we need it, not just in the general vicinity. @/pilot has the flight hours for this.
	genericDescription = Land precisely at a designated target zone on another body.
	synopsis = Land within 5km of the target zone on @/targetBody with a skilled pilot (level 2+).
	completedMessage = Touchdown confirmed — right on the money! @/pilot's precision flying just saved us a fortune in rover fuel. That's going in the Academy flight manual.

	prestige = Significant
	targetBody = @/targetBody1

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 20
	maxExpiry = 60

	rewardFunds = Random(35000.0, 70000.0)
	rewardReputation = Random(4.0, 10.0)
	rewardScience = 3.0
	failureReputation = Random(3.0, 8.0)
	failureFunds = 15000.0
	advanceFunds = 15000.0

	DATA
	{
		type = CelestialBody
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody1 = LandedBodies().Where(b => !b.IsHomeWorld() && b.HasSurface()).SelectUnique()
		title = Must have previously landed on a non-homeworld body
	}

	DATA
	{
		type = List<Kerbal>
		requiredValue = false
		skilledPilots = AllKerbals().Where(k => k.ExperienceTrait() == Pilot && k.ExperienceLevel() >= 2 && k.RosterStatus() == Available && k.Type() == Crew)
	}

	DATA
	{
		type = Kerbal
		requiredValue = false
		pilot = @/skilledPilots.Count() > 0 ? @/skilledPilots.Random() : null
		hidden = true
	}

	REQUIREMENT
	{
		name = HasSkilledPilot
		type = Expression
		expression = @/skilledPilots.Count() >= 1
		title = Must have at least one Pilot level 2 or higher
	}

	REQUIREMENT
	{
		name = HasLanded
		type = Expression
		expression = LandedBodies().Where(b => !b.IsHomeWorld()).Count() >= 1
		title = Must have landed on at least one non-homeworld body
	}

	BEHAVIOUR
	{
		name = WaypointGenerator
		type = WaypointGenerator

		RANDOM_WAYPOINT
		{
			name = Landing Zone
			icon = marker
			targetBody = @/targetBody
			altitude = 0.0
			waterAllowed = false
		}
	}

	PARAMETER
	{
		name = PrecisionLand
		type = VesselParameterGroup
		title = Precision landing at the target zone

		PARAMETER
		{
			name = HasPilot
			type = HasCrew
			trait = Pilot
			minExperience = 2
			minCrew = 1
			title = Include a skilled Pilot (level 2+)
		}

		PARAMETER
		{
			name = LandAtWaypoint
			type = VisitWaypoint
			index = 0
			distance = 5000
			title = Land within 5km of the Landing Zone
		}

		PARAMETER
		{
			name = Landed
			type = ReachState
			targetBody = @/targetBody
			situation = LANDED
			title = Be landed on @/targetBody
		}
	}
}
