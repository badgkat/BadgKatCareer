// RelayConstellation.cfg — Deploy relays around a body
// Repeatable. Each completion adds one relay to a body's network.
// RelayRepair/RelayUpgrade require 3+ relays, so this contract
// is what gets you there.

CONTRACT_TYPE
{
	name = BKMC_RelayConstellation
	group = BadgKatMissionControl

	title = Deploy relay satellite around @/targetBody1
	genericTitle = Deploy a relay satellite
	description = Mission Control wants to expand communications coverage around @/targetBody1. Deploy an additional relay satellite in a stable orbit. Each relay we add improves signal strength and reduces blackout zones. Three satellites gives full coverage — we are not there yet.
	genericDescription = Deploy a relay satellite around a body to improve communications coverage.
	synopsis = Deploy a relay satellite in orbit around @/targetBody1.
	completedMessage = New relay is online around @/targetBody1! Communications coverage just improved significantly. The network team is tracking signal strength — keep deploying until we have full coverage.

	prestige = Significant
	targetBody = @/targetBody1

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 60
	maxExpiry = 180

	rewardFunds = 25000.0
	rewardReputation = 4.0
	rewardScience = 0
	failureReputation = 2.0
	failureFunds = 10000.0
	advanceFunds = 15000.0

	DATA
	{
		type = CelestialBody
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody1 = OrbitedBodies().SelectUnique()
		title = Must have orbited a body
	}

	REQUIREMENT
	{
		name = FirstRelayDone
		type = CompleteContract
		contractType = BKMC_FirstRelay
	}

	REQUIREMENT
	{
		name = HasOrbited
		type = Expression
		expression = OrbitedBodies().Count() >= 1
		title = Must have orbited at least one body
	}

	PARAMETER
	{
		name = RelayDeployment
		type = VesselParameterGroup
		title = Deploy a relay satellite around @/targetBody1

		PARAMETER
		{
			name = IsUnmanned
			type = HasCrew
			minCrew = 0
			maxCrew = 0
			title = Must be unmanned
		}

		PARAMETER
		{
			name = IsRelay
			type = VesselIsType
			vesselType = Relay
			title = Vessel must be marked as Relay type
		}

		PARAMETER
		{
			name = InOrbit
			type = Orbit
			targetBody = @/targetBody1
			situation = ORBITING
			minAltitude = 0
			title = Be in stable orbit around @/targetBody1
		}
	}

	BEHAVIOUR
	{
		name = ChatterBox_Accept
		type = ChatterBox
		onState = CONTRACT_ACCEPTED
		title = Network Coverage

		presentation = Dialogue
		scale = 0.45
		pauseGame = true
		triggerOnce = true

		characterAName = Wernher
		characterAModel = Instructor_Wernher
		characterAAnimation = idle
		characterAColor = #FF82B4E8

		LINE
		{
			speaker = A
			text = One relay has blind spots. Three relays, evenly spaced, and nothing hides from us. Full coverage — every signal finds a path home.
		}
	}
}
