// EmergencyRescueRepair.cfg
// "We've lost contact with [vessel]. Something's wrong.
//  Get someone out there NOW."
//
// This is the high-stakes, low-frequency "oh crap" contract.
// Short deadline, high reward, real consequences for failure.
// Creates those memorable moments where everything else gets shelved
// for an emergency mission.
//
// Triggers when: You have vessels far from home
// Requires: Rendezvous + engineer EVA
// Ties into: Everything — this is the "space is dangerous" reminder

CONTRACT_TYPE
{
	name = BKMC_EmergencyRepair
	group = BadgKatMissionControl

	title = Emergency: Critical failure on @/targetVessel!
	genericTitle = Emergency vessel repair
	description = We've got a situation. @/targetVessel is reporting critical system failures — the crew is safe for now, but we're seeing cascading power issues and partial communications blackout. This is not a drill. We need an engineer out there with repair equipment ASAP. Every day we wait makes the situation worse.
	genericDescription = A vessel has experienced critical failures requiring emergency repair.
	synopsis = Launch an emergency repair mission to @/targetVessel.
	completedMessage = Crisis averted! @/targetVessel is stabilized. Gene is buying the first round at the Astronaut Complex. The press is calling it "a successful failure."

	prestige = Exceptional
	targetBody = @/targetVessel.CelestialBody()

	agent = Mission Control

	// These should be rare
	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 60
	maxExpiry = 180

	// High stakes
	rewardFunds = Random(80000.0, 150000.0)
	rewardReputation = Random(10.0, 25.0)
	rewardScience = 5.0
	failureReputation = Random(15.0, 30.0)
	failureFunds = 50000.0
	advanceFunds = 40000.0

	// Short deadline — this is urgent
	deadline = Random(60, 120)

	DATA
	{
		type = Vessel
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		// Target vessels NOT around the homeworld — these are deep space emergencies
		targetVessel = AllVessels().Where(v => v.CrewCount() > 0 && v.CelestialBody() != HomeWorld()).SelectUnique()
		title = Must have a crewed vessel away from home
	}

	REQUIREMENT
	{
		name = HasDistantCrew
		type = Expression
		expression = AllVessels().Where(v => v.CrewCount() > 0 && v.CelestialBody() != HomeWorld()).Count() >= 1
		title = Must have crewed vessels beyond homeworld
	}

	// Don't offer until mid-game
	REQUIREMENT
	{
		name = OrbitedMultiple
		type = Expression
		expression = OrbitedBodies().Count() >= 3
		title = Must have orbited at least 3 bodies
	}

	PARAMETER
	{
		name = EmergencyRepair
		type = VesselParameterGroup
		title = Emergency repair of @/targetVessel

		PARAMETER
		{
			name = HasEngineer
			type = HasCrew
			trait = Engineer
			minCrew = 1
			title = Include an Engineer
		}

		PARAMETER
		{
			name = ReachTarget
			type = Rendezvous
			vessel = @/targetVessel
			distance = 200
			title = Rendezvous with @/targetVessel
		}
	}
}
