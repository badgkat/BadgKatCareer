// EmergencyRescueRepair.cfg — REQUIRES Engineer Level 3+
// "We've lost contact with [vessel]. Something's wrong."
// The high-stakes contract. Send your BEST engineer.
// Ties into: Academy (you need to have invested in training), KerbalStats

CONTRACT_TYPE
{
	name = BKMC_EmergencyRepair
	group = BadgKatMissionControl

	title = Emergency: Critical failure on @/targetVessel!
	genericTitle = Emergency vessel repair
	description = We've got a situation. @/targetVessel is reporting critical system failures — cascading power issues, partial communications blackout, and the crew is running on backup life support. This is not a drill. We need @/seniorEngineer or another senior engineer out there ASAP. Rookies need not apply — this is a level 3 job minimum.
	genericDescription = A vessel has experienced critical failures requiring emergency repair by a senior engineer.
	synopsis = Launch an emergency repair mission to @/targetVessel with a senior engineer (level 3+).
	completedMessage = Crisis averted! @/targetVessel is stabilized. Gene is buying the first round at the Astronaut Complex. @/seniorEngineer's repair log is going in the Academy textbook — the next generation of engineers will study this one.

	prestige = Exceptional
	targetBody = @/targetVessel.CelestialBody()

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 60
	maxExpiry = 180

	rewardFunds = Random(80000.0, 150000.0)
	rewardReputation = Random(10.0, 25.0)
	rewardScience = 5.0
	failureReputation = Random(15.0, 30.0)
	failureFunds = 50000.0
	advanceFunds = 40000.0

	deadline = Random(60, 120)

	DATA
	{
		type = Vessel
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		targetVessel = AllVessels().Where(v => v.CrewCount() > 0 && v.CelestialBody() != HomeWorld()).SelectUnique()
		title = Must have a crewed vessel away from home
	}

	DATA
	{
		type = List<Kerbal>
		requiredValue = false
		seniorEngineers = AllKerbals().Where(k => k.ExperienceTrait() == Engineer && k.ExperienceLevel() >= 3 && k.RosterStatus() == Available && k.Type() == Crew)
	}

	DATA
	{
		type = Kerbal
		requiredValue = false
		seniorEngineer = @/seniorEngineers.Count() > 0 ? @/seniorEngineers.Random() : null
		hidden = true
	}

	REQUIREMENT
	{
		name = HasDistantCrew
		type = Expression
		expression = AllVessels().Where(v => v.CrewCount() > 0 && v.CelestialBody() != HomeWorld()).Count() >= 1
		title = Must have crewed vessels beyond homeworld
	}

	REQUIREMENT
	{
		name = OrbitedMultiple
		type = Expression
		expression = OrbitedBodies().Count() >= 3
		title = Must have orbited at least 3 bodies
	}

	// The real gate: you need a senior engineer
	REQUIREMENT
	{
		name = HasSeniorEngineer
		type = Expression
		expression = @/seniorEngineers.Count() >= 1
		title = Must have at least one Engineer level 3 or higher
	}

	PARAMETER
	{
		name = EmergencyRepair
		type = VesselParameterGroup
		title = Emergency repair of @/targetVessel

		PARAMETER
		{
			name = HasSeniorEngineer
			type = HasCrew
			trait = Engineer
			minExperience = 3
			minCrew = 1
			title = Include a senior Engineer (level 3+)
		}

		PARAMETER
		{
			name = HasEVAKit
			type = PartValidation
			partModule = ModuleInventoryPart
			minCount = 1
			title = Bring repair equipment
		}

		PARAMETER
		{
			name = ReachTarget
			type = Rendezvous
			vessel = @/targetVessel
			distance = 200
			title = Rendezvous with @/targetVessel
		}
	}
}
