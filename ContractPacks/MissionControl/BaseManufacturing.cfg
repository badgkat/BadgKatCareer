// BaseManufacturing.cfg
// "Establish off-world manufacturing capability."
//
// The endgame career arc: stop hauling everything from Kerbin.
// Build a base that can mine, refine, and construct.
// This is the Artemis dream — sustainable off-world presence.
//
// Triggers when: You've landed on a body + have construction tech
// Requires: Base with drill, converter, and docking port
// Ties into: Sandcastle, SimpleConstruction, MiningExpansion, RationalResources

CONTRACT_TYPE
{
	name = BKMC_BaseManufacturing
	group = BadgKatMissionControl

	title = Establish manufacturing base on @/targetBody
	genericTitle = Establish off-world manufacturing capability
	description = The accountants have been running the numbers and the results are clear: we can't keep launching everything from Kerbin. It's time to go local. Establish a surface base on @/targetBody with mining and manufacturing capability. The idea is simple — drill it, refine it, build with it. Wernher has been calling it "living off the land." Gene has been calling it "about time."
	genericDescription = Establish a self-sustaining manufacturing base on another celestial body.
	synopsis = Build a base on @/targetBody with mining, refining, and construction capability.
	completedMessage = Manufacturing base is operational! @/targetBody is now a production hub. The next generation of spacecraft might just be built out here.

	prestige = Exceptional
	targetBody = @/targetBody1

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 60
	maxExpiry = 180

	// Big milestone, big rewards
	rewardFunds = Random(150000.0, 300000.0)
	rewardReputation = Random(15.0, 30.0)
	rewardScience = 15.0
	failureReputation = Random(5.0, 10.0)
	failureFunds = 50000.0
	advanceFunds = 80000.0

	// No deadline — this is a big project, take your time
	// deadline = 0

	DATA
	{
		type = CelestialBody
		requiredValue = true
		uniquenessCheck = GROUP_ACTIVE
		targetBody1 = LandedBodies().Where(b => !b.IsHomeWorld() && b.HasSurface()).SelectUnique()
		title = Must have landed on a non-homeworld body
	}

	// Mid-to-late game
	REQUIREMENT
	{
		name = LandedSomewhere
		type = Expression
		expression = LandedBodies().Where(b => !b.IsHomeWorld()).Count() >= 1
		title = Must have landed on at least one other body
	}

	REQUIREMENT
	{
		name = HasISRUTech
		type = TechResearched
		tech = advScienceTech
	}

	PARAMETER
	{
		name = ManufacturingBase
		type = VesselParameterGroup
		title = Deploy a manufacturing base on @/targetBody

		PARAMETER
		{
			name = LandedOnBody
			type = ReachState
			targetBody = @/targetBody
			situation = LANDED
			title = Base must be landed on @/targetBody
		}

		PARAMETER
		{
			name = HasDrill
			type = PartValidation
			partModule = ModuleResourceHarvester
			minCount = 1
			title = Include a mining drill
		}

		PARAMETER
		{
			name = HasConverter
			type = PartValidation
			partModule = ModuleResourceConverter
			minCount = 1
			title = Include a resource converter
		}

		PARAMETER
		{
			name = HasDockingPort
			type = PartValidation
			partModule = ModuleDockingNode
			minCount = 1
			title = Include a docking port (for vessel assembly)
		}

		PARAMETER
		{
			name = HasPower
			type = Any
			title = Have a power generation system

			PARAMETER
			{
				name = SolarPanels
				type = PartValidation
				partModule = ModuleDeployableSolarPanel
				minCount = 1
				title = Solar panels
			}

			PARAMETER
			{
				name = Generator
				type = PartValidation
				partModule = ModuleGenerator
				minCount = 1
				title = Power generator
			}
		}

		PARAMETER
		{
			name = HasEngineer
			type = HasCrew
			trait = Engineer
			minCrew = 1
			title = Station an Engineer at the base
		}
	}
}
