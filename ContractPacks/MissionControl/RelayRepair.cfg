// RelayRepair.cfg
// "A relay satellite around [body] has experienced a malfunction.
//  Send an engineer to perform EVA repairs before we lose coverage."
//
// Triggers when: You have relay sats around a body
// Requires: Engineer EVA near the vessel
// Stakes: Time deadline, reputation loss on failure
// Ties into: CommNetRelays, Constellations (they built it, you maintain it)

CONTRACT_TYPE
{
	name = BKMC_RelayRepair
	group = BadgKatMissionControl

	title = Repair malfunctioning relay around @/targetBody
	genericTitle = Repair a malfunctioning relay satellite
	description = Mission Control has detected anomalous signal degradation from one of our relay satellites orbiting @/targetBody. Telemetry suggests a solar panel actuator failure — nothing catastrophic yet, but if we don't send an engineer to perform EVA repairs, we'll lose coverage in that sector. Engineers with EVA repair kits report this is a routine fix.
	genericDescription = One of our relay satellites needs EVA maintenance from a qualified engineer.
	synopsis = Send an engineer to repair the relay satellite around @/targetBody.
	completedMessage = Relay is back online! Good work — Mission Control confirms full signal strength restored.

	prestige = Significant
	targetBody = @/targetBody

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	// Cooldown: don't spam these
	minExpiry = 30
	maxExpiry = 90

	rewardFunds = Random(30000.0, 60000.0)
	rewardReputation = Random(3.0, 8.0)
	rewardScience = 0
	failureReputation = Random(5.0, 15.0)
	failureFunds = 20000.0
	advanceFunds = 15000.0

	// Must have a deadline — this is urgent
	deadline = Random(120, 240)

	// Find a body where we have relay sats
	DATA
	{
		type = List<Vessel>
		requiredValue = false
		allRelays = AllVessels().Where(v => v.VesselType() == Relay)
	}

	DATA
	{
		type = CelestialBody
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody = @/allRelays.Where(v => v.CelestialBody().IsOrbitalBody()).Select(v => v.CelestialBody()).SelectUnique()
		title = Must have at least one relay satellite in orbit
	}

	// Don't offer until player has some infrastructure
	REQUIREMENT
	{
		name = RelayCount
		type = Expression
		expression = @/allRelays.Count() >= 3
		title = Must have at least 3 relay satellites deployed
	}

	// Don't offer too early
	REQUIREMENT
	{
		name = TechCheck
		type = TechResearched
		tech = electrics
	}

	PARAMETER
	{
		name = RepairMission
		type = VesselParameterGroup
		title = Send a repair vessel to @/targetBody

		PARAMETER
		{
			name = HasEngineer
			type = HasCrew
			trait = Engineer
			minCrew = 1
			title = Include at least one Engineer
		}

		PARAMETER
		{
			name = HasEVAKit
			type = Any
			title = Bring EVA repair capability

			PARAMETER
			{
				name = HasRepairKit
				type = PartValidation
				partModule = ModuleInventoryPart
				minCount = 1
				title = Have inventory storage (for repair kits)
			}
		}

		PARAMETER
		{
			name = ReachBody
			type = Orbit
			targetBody = @/targetBody
			situation = ORBITING
			title = Enter orbit around @/targetBody
		}

		PARAMETER
		{
			name = DoEVA
			type = HasCrew
			trait = Engineer
			minCrew = 1
			title = Perform EVA repair (have engineer aboard in orbit)
			// The narrative is the repair — having an engineer in orbit is the gameplay
		}
	}
}
