// RelayRepair.cfg — REQUIRES Engineer Level 1+
// "A relay satellite around [body] has experienced a malfunction."
// Ties into: CommNetRelays, Constellations, Kerbal Academy (need trained engineers)

CONTRACT_TYPE
{
	name = BKMC_RelayRepair
	group = BadgKatMissionControl

	title = Repair malfunctioning relay around @/targetBody
	genericTitle = Repair a malfunctioning relay satellite
	description = Mission Control has detected anomalous signal degradation from one of our relay satellites orbiting @/targetBody. Telemetry suggests a solar panel actuator failure. We need a trained engineer — someone who's been through at least basic Academy training — to perform EVA repairs before we lose coverage.
	genericDescription = One of our relay satellites needs EVA maintenance from a trained engineer.
	synopsis = Send a trained engineer (level 1+) to repair the relay around @/targetBody.
	completedMessage = Relay is back online! Good work — Mission Control confirms full signal strength restored. @/engineer has logged the repair in their service record.

	prestige = Significant
	targetBody = @/targetBody1

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 30
	maxExpiry = 90

	rewardFunds = Random(30000.0, 60000.0)
	rewardReputation = Random(3.0, 8.0)
	rewardScience = 0
	failureReputation = Random(5.0, 15.0)
	failureFunds = 20000.0
	advanceFunds = 15000.0

	deadline = Random(120, 240)

	DATA
	{
		type = List<Vessel>
		requiredValue = false
		allRelays = AllVessels().Where(v => v.VesselType() == Relay)
	}

	DATA
	{
		type = CelestialBody
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody1 = @/allRelays.Select(v => v.CelestialBody()).SelectUnique()
		title = Must have at least one relay satellite in orbit
	}

	// Check we have a trained engineer available
	DATA
	{
		type = List<Kerbal>
		requiredValue = false
		trainedEngineers = AllKerbals().Where(k => k.ExperienceTrait() == Engineer && k.ExperienceLevel() >= 1 && k.RosterStatus() == Available && k.Type() == Crew)
	}

	// Kerbal for flavor text
	DATA
	{
		type = Kerbal
		requiredValue = false
		engineer = @/trainedEngineers.Count() > 0 ? @/trainedEngineers.Random() : null
		hidden = true
	}

	REQUIREMENT
	{
		name = RelayCount
		type = Expression
		expression = @/allRelays.Count() >= 3
		title = Must have at least 3 relay satellites deployed
	}

	REQUIREMENT
	{
		name = TechCheck
		type = TechResearched
		tech = electrics
	}

	// Must have at least one trained engineer
	REQUIREMENT
	{
		name = HasTrainedEngineer
		type = Expression
		expression = @/trainedEngineers.Count() >= 1
		title = Must have at least one Engineer level 1 or higher
	}

	PARAMETER
	{
		name = RepairMission
		type = VesselParameterGroup
		title = Send a repair vessel to @/targetBody

		PARAMETER
		{
			name = HasEngineer
			type = HasCrew
			trait = Engineer
			minExperience = 1
			minCrew = 1
			title = Include a trained Engineer (level 1+)
		}

		PARAMETER
		{
			name = HasEVAKit
			type = PartValidation
			partModule = ModuleInventoryPart
			minCount = 1
			title = Bring inventory storage for repair kits
		}

		PARAMETER
		{
			name = ReachBody
			type = Orbit
			targetBody = @/targetBody
			situation = ORBITING
			minAltitude = 0
			title = Enter orbit around @/targetBody
		}
	}
}
