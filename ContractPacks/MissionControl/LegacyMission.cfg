// LegacyMission.cfg — Generational contract
// "Send a new generation kerbal to follow in a veteran's footsteps."
// This is the emotional heart of the multigenerational career.
// A veteran explored a body. Now send a newer kerbal there.
// Ties into: Kerbal Generations (offspring), Academy (training),
//            ExplorationPlus (original exploration)

CONTRACT_TYPE
{
	name = BKMC_LegacyMission
	group = BadgKatMissionControl

	title = Legacy mission to @/targetBody
	genericTitle = Legacy mission — follow in a veteran's footsteps
	description = The original exploration of @/targetBody was a defining moment for our space program. Now it's time for a new generation to walk — or float — in those footsteps. Send a less experienced kerbal (level 0-1) to @/targetBody, accompanied by an experienced mentor (level 3+). Let the old guard show the new crew what it's really like out there. This is how traditions are passed down.
	genericDescription = A veteran and a rookie retrace a historic mission together.
	synopsis = Send a mentor (level 3+) and a rookie (level 0-1) together to @/targetBody.
	completedMessage = Mission complete. The rookie's eyes were wide the whole way. The mentor just smiled — they've seen it before, but it never gets old. A new generation carries the torch. This is what a space program is for.

	prestige = Exceptional
	targetBody = @/targetBody1

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 60
	maxExpiry = 180

	// The reward is mostly reputation — this is a prestige mission
	rewardFunds = Random(30000.0, 60000.0)
	rewardReputation = Random(15.0, 30.0)
	rewardScience = 10.0
	failureReputation = Random(5.0, 15.0)
	failureFunds = 20000.0
	advanceFunds = 25000.0

	DATA
	{
		type = CelestialBody
		requiredValue = true
		uniquenessCheck = GROUP_ACTIVE
		// Pick a body we've landed on before — this is a RETURN mission
		targetBody1 = LandedBodies().Where(b => !b.IsHomeWorld() && b.HasSurface()).SelectUnique()
		title = Must have previously landed on a non-homeworld body
	}

	DATA
	{
		type = List<Kerbal>
		requiredValue = false
		veterans = AllKerbals().Where(k => k.ExperienceLevel() >= 3 && k.RosterStatus() == Available && k.Type() == Crew)
		rookies = AllKerbals().Where(k => k.ExperienceLevel() <= 1 && k.RosterStatus() == Available && k.Type() == Crew)
	}

	REQUIREMENT
	{
		name = HasVeteran
		type = Expression
		expression = @/veterans.Count() >= 1
		title = Must have at least one veteran (level 3+)
	}

	REQUIREMENT
	{
		name = HasRookie
		type = Expression
		expression = @/rookies.Count() >= 1
		title = Must have at least one rookie (level 0-1)
	}

	REQUIREMENT
	{
		name = HasLanded
		type = Expression
		expression = LandedBodies().Where(b => !b.IsHomeWorld()).Count() >= 1
		title = Must have landed on at least one body beyond homeworld
	}

	// This should be a mid-to-late game thing
	REQUIREMENT
	{
		name = MinBodies
		type = Expression
		expression = OrbitedBodies().Count() >= 5
		title = Must have orbited at least 5 bodies
	}

	PARAMETER
	{
		name = LegacyMissionParams
		type = VesselParameterGroup
		title = Legacy mission to @/targetBody

		PARAMETER
		{
			name = HasVeteran
			type = HasCrew
			minExperience = 3
			minCrew = 1
			title = Include a veteran mentor (level 3+)
		}

		PARAMETER
		{
			name = HasRookie
			type = HasCrew
			maxExperience = 1
			minCrew = 1
			title = Include a rookie (level 0-1)
		}

		PARAMETER
		{
			name = LandOnBody
			type = ReachState
			targetBody = @/targetBody
			situation = LANDED
			title = Land on @/targetBody
		}
	}

	PARAMETER
	{
		name = BringThemHome
		type = ReturnHome
		title = Return both crew safely home
	}
}
