// StationResupply.cfg
// "The crew aboard [station] is running low on Snacks.
//  Send a resupply vessel before they get hangry."
//
// Triggers when: You have a crewed station
// Requires: Dock a vessel with Snacks aboard
// Stakes: Crew gets grumpy (Snacks penalty), reputation hit
// Ties into: KerbinSpaceStation (built it), Snacks (the resource)

CONTRACT_TYPE
{
	name = BKMC_StationResupply
	group = BadgKatMissionControl

	title = Resupply @/targetStation with Snacks
	genericTitle = Resupply a space station
	description = The crew aboard @/targetStation has been reporting that the snack cabinet is looking a bit bare. Bill swears he's been rationing, but Bob keeps finding empty wrappers stuffed behind the equipment racks. Send a supply run with fresh Snacks before morale takes a hit.
	genericDescription = A station's crew is running low on Snacks and needs a resupply mission.
	synopsis = Deliver Snacks to @/targetStation.
	completedMessage = Resupply complete! The crew reports morale is way up — Jeb found the gummy worms.

	prestige = Trivial
	targetBody = @/targetStation.CelestialBody()

	agent = Mission Control

	maxSimultaneous = 2
	maxCompletions = 0

	minExpiry = 20
	maxExpiry = 60

	rewardFunds = Random(15000.0, 40000.0)
	rewardReputation = Random(2.0, 5.0)
	rewardScience = 0
	failureReputation = Random(3.0, 8.0)
	failureFunds = 10000.0
	advanceFunds = 10000.0

	deadline = Random(90, 180)

	// Find a station
	DATA
	{
		type = Vessel
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		targetStation = AllVessels().Where(v => v.VesselType() == Station && v.CrewCount() > 0).SelectUnique()
		title = Must have a crewed station
	}

	// Need Snacks mod
	REQUIREMENT
	{
		name = SnacksCheck
		type = PartModuleUnlocked
		partModule = SnacksProcessor
		title = Must have Snacks mod installed
	}

	REQUIREMENT
	{
		name = HasStation
		type = Expression
		expression = AllVessels().Where(v => v.VesselType() == Station && v.CrewCount() > 0).Count() >= 1
		title = Must have at least one crewed station
	}

	PARAMETER
	{
		name = ResupplyMission
		type = VesselParameterGroup
		title = Deliver Snacks to @/targetStation

		// Must carry Snacks
		PARAMETER
		{
			name = HasSnacks
			type = HasResource
			resource = Snacks
			minQuantity = 100
			title = Carry at least 100 units of Snacks
		}

		PARAMETER
		{
			name = DockWithStation
			type = Docking
			vessel = @/targetStation
			title = Dock with @/targetStation
		}
	}
}
