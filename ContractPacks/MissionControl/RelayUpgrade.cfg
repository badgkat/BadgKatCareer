// RelayUpgrade.cfg — REQUIRES Engineer Level 2+
// "Your early relay network is outdated. Upgrade it."
// Ties infrastructure BUILDING back into MAINTAINING.
// You built relays with CommNetRelays. Now you've unlocked better antennas.
// Go upgrade them using EVA construction instead of launching replacements.
// Ties into: CommNetRelays, Constellations, EVA Construction, Academy

CONTRACT_TYPE
{
	name = BKMC_RelayUpgrade
	group = BadgKatMissionControl

	title = Upgrade relay network around @/targetBody
	genericTitle = Upgrade a relay satellite
	description = Our relay coverage around @/targetBody is functional, but the original satellites were built with early-career technology. Now that we've unlocked better antennas and power systems, the Engineering Division recommends an in-situ upgrade rather than launching replacements. Send an experienced engineer with the new components — they can swap them out via EVA construction.
	genericDescription = Upgrade an aging relay satellite with newer technology via EVA construction.
	synopsis = Send an experienced engineer (level 2+) to upgrade a relay around @/targetBody.
	completedMessage = Relay upgraded! Signal strength increased significantly. The Engineering Division notes this was far cheaper than launching a replacement — the future of space infrastructure is maintenance, not disposal.

	prestige = Significant
	targetBody = @/targetBody1

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 45
	maxExpiry = 120

	rewardFunds = Random(40000.0, 80000.0)
	rewardReputation = Random(5.0, 12.0)
	rewardScience = 0
	failureReputation = Random(3.0, 8.0)
	failureFunds = 20000.0
	advanceFunds = 20000.0

	DATA
	{
		type = List<Vessel>
		requiredValue = false
		allRelays = AllVessels().Where(v => v.VesselType() == Relay)
	}

	DATA
	{
		type = CelestialBody
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		targetBody1 = @/allRelays.Select(v => v.CelestialBody()).SelectUnique()
		title = Must have relays to upgrade
	}

	DATA
	{
		type = List<Kerbal>
		requiredValue = false
		expEngineers = AllKerbals().Where(k => k.ExperienceTrait() == Engineer && k.ExperienceLevel() >= 2 && k.RosterStatus() == Available && k.Type() == Crew)
	}

	REQUIREMENT
	{
		name = HasRelays
		type = Expression
		expression = @/allRelays.Count() >= 3
		title = Must have at least 3 relays deployed
	}

	REQUIREMENT
	{
		name = HasExpEngineer
		type = Expression
		expression = @/expEngineers.Count() >= 1
		title = Must have at least one Engineer level 2 or higher
	}

	// Should come later than basic repair
	REQUIREMENT
	{
		name = HasDoneRepair
		type = CompleteContract
		contractType = BKMC_RelayRepair
		minCount = 1
		title = Must have completed at least one relay repair
	}

	PARAMETER
	{
		name = UpgradeMission
		type = VesselParameterGroup
		title = Upgrade relay around @/targetBody

		PARAMETER
		{
			name = HasExpEngineer
			type = HasCrew
			trait = Engineer
			minExperience = 2
			minCrew = 1
			title = Include an experienced Engineer (level 2+)
		}

		PARAMETER
		{
			name = HasEVAKit
			type = PartValidation
			partModule = ModuleInventoryPart
			minCount = 1
			title = Bring upgrade components in inventory
		}

		PARAMETER
		{
			name = ReachRelay
			type = Orbit
			targetBody = @/targetBody
			situation = ORBITING
			minAltitude = 0
			title = Enter orbit around @/targetBody
		}
	}
}
