// VeteranRetirement.cfg — Generational contract
// "A veteran kerbal's last mission: bring them home."
// Not every contract is about going further. Sometimes it's about
// honoring the ones who got us here.
// Ties into: Kerbal Generations (retirement), Crew R&R

CONTRACT_TYPE
{
	name = BKMC_VeteranRetirement
	group = BadgKatMissionControl

	title = Retirement flight: bring @/retiree home
	genericTitle = Veteran retirement ceremony flight
	description = A veteran kerbal has served the space program with distinction. They've mentored rookies, and kept more spacecraft running than anyone can count. It's time for one last flight. Bring them up to orbit one more time, let them see Kerbin from above, and return them safely to KSC. The whole program will be watching.
	genericDescription = A veteran kerbal deserves a proper send-off — one last flight before retirement.
	synopsis = Take @/retiree on a final orbit of homeworld and return home.
	completedMessage = Welcome home, @/retiree. The entire KSC turned out for the landing. Gene wiped away a tear (he'll deny it). The Academy has announced a scholarship in their name. Fair winds and following seas, old friend.

	prestige = Exceptional
	targetBody = HomeWorld()

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 30
	maxExpiry = 60

	// This is about reputation, not money
	rewardFunds = Random(10000.0, 20000.0)
	rewardReputation = Random(20.0, 40.0)
	rewardScience = 0
	failureReputation = Random(10.0, 25.0)
	failureFunds = 0
	advanceFunds = 10000.0

	DATA
	{
		type = Kerbal
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		retiree = AllKerbals().Where(k => k.ExperienceLevel() >= 4 && k.RosterStatus() == Available && k.Type() == Crew).Random()
		title = Must have a veteran kerbal (level 4+) available
	}

	REQUIREMENT
	{
		name = HasVeteran
		type = Expression
		expression = AllKerbals().Where(k => k.ExperienceLevel() >= 4 && k.RosterStatus() == Available && k.Type() == Crew).Count() >= 1
		title = Must have at least one level 4+ kerbal
	}

	// Late game only
	REQUIREMENT
	{
		name = MinBodies
		type = Expression
		expression = OrbitedBodies().Count() >= 4
		title = Must have orbited at least 4 bodies
	}

	// Don't spam these
	REQUIREMENT
	{
		name = Cooldown
		type = CompleteContract
		contractType = BKMC_VeteranRetirement
		minCount = 0
		cooldownDuration = 180d
	}

	PARAMETER
	{
		name = RetirementFlight
		type = VesselParameterGroup
		title = Retirement flight

		PARAMETER
		{
			name = HasRetiree
			type = HasCrew
			kerbal = @/retiree
			title = The retiree must be aboard
		}

		PARAMETER
		{
			name = OrbitHome
			type = Orbit
			targetBody = HomeWorld()
			situation = ORBITING
			minAltitude = 0
			title = One last orbit of homeworld
		}
	}

	PARAMETER
	{
		name = FinalLanding
		type = ReturnHome
		title = Return @/retiree safely to KSC
	}
}
