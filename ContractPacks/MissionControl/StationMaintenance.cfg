// StationMaintenance.cfg
// "Routine inspection needed on [station]. Send an engineer."
//
// This is the bread-and-butter "things need fixing" contract.
// Engineer goes EVA, does the repair, station keeps running.
// Gives engineers real purpose beyond "sometimes useful."
//
// Triggers when: Station has been around a while
// Requires: Engineer EVA at the station
// Ties into: KerbinSpaceStation, EVA construction system

CONTRACT_TYPE
{
	name = BKMC_StationMaintenance
	group = BadgKatMissionControl

	title = Maintenance inspection on @/targetStation
	genericTitle = Perform station maintenance
	description = It's been a while since @/targetStation had a proper once-over. Telemetry shows some minor issues — a sticky solar panel gimbal, some micro-debris impacts on the radiators, and what appears to be a snack crumb lodged in the attitude sensor. Nothing critical yet, but if we don't send an engineer to sort it out, these small problems have a way of becoming big problems.
	genericDescription = A station needs routine maintenance from a qualified engineer.
	synopsis = Send an engineer to perform maintenance EVA on @/targetStation.
	completedMessage = Maintenance complete! The engineer reports everything is shipshape. They also found Jeb's missing socket wrench floating behind module 3.

	prestige = Trivial
	targetBody = @/targetStation.CelestialBody()

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 45
	maxExpiry = 120

	rewardFunds = Random(20000.0, 45000.0)
	rewardReputation = Random(2.0, 6.0)
	rewardScience = 0
	failureReputation = Random(3.0, 10.0)
	failureFunds = 10000.0
	advanceFunds = 10000.0

	deadline = Random(180, 360)

	DATA
	{
		type = Vessel
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		targetStation = AllVessels().Where(v => v.VesselType() == Station).SelectUnique()
		title = Must have a station deployed
	}

	REQUIREMENT
	{
		name = HasStation
		type = Expression
		expression = AllVessels().Where(v => v.VesselType() == Station).Count() >= 1
		title = Must have at least one station
	}

	REQUIREMENT
	{
		name = HasEVATech
		type = TechResearched
		tech = generalConstruction
	}

	PARAMETER
	{
		name = MaintenanceMission
		type = VesselParameterGroup
		title = Perform maintenance on @/targetStation

		PARAMETER
		{
			name = HasEngineer
			type = HasCrew
			trait = Engineer
			minCrew = 1
			title = Bring an Engineer
		}

		PARAMETER
		{
			name = DockWithStation
			type = Docking
			vessel = @/targetStation
			title = Dock with @/targetStation
		}
	}
}
