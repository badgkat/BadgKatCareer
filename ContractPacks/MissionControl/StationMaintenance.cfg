// StationMaintenance.cfg — Any engineer (level 0+)
// Routine maintenance. The entry-level engineer contract.
// Fresh Academy graduates can handle this — it's how they build experience.
// Ties into: KerbinSpaceStation, Academy Boot Camp

CONTRACT_TYPE
{
	name = BKMC_StationMaintenance
	group = BadgKatMissionControl

	title = Maintenance inspection on @/targetStation
	genericTitle = Perform station maintenance
	description = It's been a while since @/targetStation had a proper once-over. Telemetry shows some minor issues — a sticky solar panel gimbal, some micro-debris impacts on the radiators, and what appears to be a snack crumb lodged in the attitude sensor. This is a good training opportunity for any of our engineers, even fresh Academy graduates.
	genericDescription = A station needs routine maintenance from an engineer.
	synopsis = Send any engineer to perform maintenance on @/targetStation.
	completedMessage = Maintenance complete! The engineer reports everything is shipshape. They also found Jeb's missing socket wrench floating behind module 3. Another service call logged in the books.

	prestige = Trivial
	targetBody = @/targetStation.CelestialBody()

	agent = Mission Control

	maxSimultaneous = 1
	maxCompletions = 0

	minExpiry = 45
	maxExpiry = 120

	rewardFunds = Random(20000.0, 45000.0)
	rewardReputation = Random(2.0, 6.0)
	rewardScience = 0
	failureReputation = Random(3.0, 10.0)
	failureFunds = 10000.0
	advanceFunds = 10000.0

	// Generous deadline — routine, not urgent
	deadline = Random(180, 360)

	DATA
	{
		type = Vessel
		requiredValue = true
		uniquenessCheck = CONTRACT_ACTIVE
		targetStation = AllVessels().Where(v => v.VesselType() == Station).SelectUnique()
		title = Must have a station deployed
	}

	REQUIREMENT
	{
		name = HasStation
		type = Expression
		expression = AllVessels().Where(v => v.VesselType() == Station).Count() >= 1
		title = Must have at least one station
	}

	REQUIREMENT
	{
		name = HasEVATech
		type = TechResearched
		tech = generalConstruction
	}

	// Cooldown so it doesn't spam
	REQUIREMENT
	{
		name = Cooldown
		type = CompleteContract
		contractType = BKMC_StationMaintenance
		minCount = 0
		cooldownDuration = 60d
	}

	PARAMETER
	{
		name = MaintenanceMission
		type = VesselParameterGroup
		title = Perform maintenance on @/targetStation

		PARAMETER
		{
			name = HasEngineer
			type = HasCrew
			trait = Engineer
			minCrew = 1
			title = Bring an Engineer (any level)
		}

		PARAMETER
		{
			name = DockWithStation
			type = Docking
			vessel = @/targetStation
			title = Dock with @/targetStation
		}
	}
}
