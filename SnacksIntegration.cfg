// ============================================================================
// GREENHOUSES — Snack Processors (convert Ore to Snacks)
// ============================================================================

@PART[sspx-greenhouse-25-1,sspx-greenhouse-375-1,sspx-greenhouse-5-1,sspx-cupola-greenhouse-125-1]:NEEDS[StationPartsExpansionRedux&Snacks]:AFTER[Snacks]
{
	MODULE
	{
		name = SnacksProcessor
		ConverterName = Snack Grower
		StartActionName = Start Snack Grower
		StopActionName = Stop Snack Grower
		AutoShutdown = false
		GeneratesHeat = false
		UseSpecialistBonus = true
		UseSpecializationBonus = true
		SpecialistEfficiencyFactor = 0.1
		ExperienceEffect = ScienceSkill
		EfficiencyBonus = 1.0

		INPUT_RESOURCE
		{
			ResourceName = Ore
			Ratio = 0.002
			FlowMode = STAGE_PRIORITY_FLOW
		}
		INPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = 30
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = Snacks
			Ratio = 0.001
			DumpExcess = false
			FlowMode = STAGE_PRIORITY_FLOW
		}
	}
}

