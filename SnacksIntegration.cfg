// SnacksIntegration.cfg
// Add Soil Recyclers to modded crew habitats and Snack Processors to greenhouses.
// Snacks auto-adds snack storage to all crewed parts via its plugin, but recyclers
// and processors need to be patched in manually.
//
// Without recyclers, long-duration missions (especially to OPM) need absurd amounts
// of snacks. Recyclers let crews stretch their supply.
//
// RecyclerCapacity = crew count the recycler can support at 100% efficiency.
// Soil storage = 50 per supported kerbal.

// ============================================================================
// STATION PARTS EXPANSION REDUX — Habitation modules
// These are dedicated living space; recyclers belong here.
// ============================================================================

// 1.25m habitation (2 crew)
@PART[sspx-habitation-125-1]:NEEDS[StationPartsExpansionRedux&Snacks]:AFTER[Snacks]
{
	MODULE
	{
		name = SoilRecycler
		ConverterName = Soil Recycler
		StartActionName = Start Soil Recycler
		StopActionName = Stop Soil Recycler
		AutoShutdown = false
		GeneratesHeat = false
		UseSpecialistBonus = true
		ExperienceEffect = ConverterSkill
		EfficiencyBonus = 1.0
		RecyclerCapacity = 2

		INPUT_RESOURCE
		{
			ResourceName = Soil
			Ratio = 0.00004630
			FlowMode = ALL_VESSEL
		}
		INPUT_RESOURCE
		{
			ResourceName = ElectricCharge
			Ratio = 3
			FlowMode = STAGE_PRIORITY_FLOW
		}
		OUTPUT_RESOURCE
		{
			ResourceName = Snacks
			Ratio = 0.00004630
			DumpExcess = false
			FlowMode = ALL_VESSEL
		}
	}
	RESOURCE
	{
		name = Soil
		amount = 0
		maxAmount = 100
	}
}

