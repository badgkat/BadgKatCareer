// ContractTweaks.cfg
// Disable stock contracts that are annoying, impossible, or don't fit the
// BadgKatCareer experience. Keep contracts that give you a REASON to launch,
// not busywork.

// ============================================================================
// DISABLE PART TEST CONTRACTS
// "Test the RT-5 Flea between 28,000m and 42,000m while flying above Kerbin"
// These are tedious, unrewarding, and feel like filler. Nobody's space program
// was built on testing parts mid-flight for cash.
// ============================================================================
CONTRACT_GROUP
{
	name = BadgKatCareer_DisablePartTest
	disabledContractType = PartTest
}

// ============================================================================
// DISABLE SURVEY CONTRACTS
// "Take a temperature reading above 18,000m at this exact spot"
// These are often physically impossible or require absurd precision.
// FieldResearch already provides better science collection contracts.
// ============================================================================
CONTRACT_GROUP
{
	name = BadgKatCareer_DisableSurvey
	disabledContractType = SurveyContract
}
