// ContractTweaks.cfg
// Disable stock contracts that are annoying, impossible, or don't fit the
// BadgKatCareer experience. Keep contracts that give you a REASON to launch,
// not busywork.

// ============================================================================
// DISABLE PART TEST CONTRACTS
// "Test the RT-5 Flea between 28,000m and 42,000m while flying above Kerbin"
// These are tedious, unrewarding, and feel like filler. Nobody's space program
// was built on testing parts mid-flight for cash.
// ============================================================================
CONTRACT_GROUP
{
	name = BadgKatCareer_DisablePartTest
	minVersion = 1.15.0
	disabledContractType = PartTest
}

// ============================================================================
// DISABLE SURVEY CONTRACTS
// "Take a temperature reading above 18,000m at this exact spot"
// These are often physically impossible or require absurd precision.
// FieldResearch already provides better science collection contracts.
// ============================================================================
CONTRACT_GROUP
{
	name = BadgKatCareer_DisableSurvey
	minVersion = 1.15.0
	disabledContractType = SurveyContract
}

// ============================================================================
// DISABLE GAP MARKETPLACE (Part Unlock Shop)
// GAP's "Prototype Marketplace" lets you buy parts with funds, bypassing the
// tech tree. That undermines our science-driven progression. The rest of GAP
// (milestones, airline flights, stunts, rescues) is great — just kill the shop.
//
// We delete these CONTRACT_TYPE nodes entirely so CC never sees them.
// ============================================================================
-CONTRACT_TYPE[GAP-Wright-Wing]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Wright-Elevon]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Wright-FuelLine]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Wright-FuelTank]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Wright-Intake]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Wright-Sepratron]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Ford-CubicStrut]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Ford-Ladder]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Ford-iBeam]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Tesla-Battery]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Tesla-Wheel]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Inigma-CommandSeat]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Inigma-Decoupler]:NEEDS[GAP]:FINAL { }
-CONTRACT_TYPE[GAP-Loan]:NEEDS[GAP]:FINAL { }
